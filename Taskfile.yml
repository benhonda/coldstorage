version: "3"

# https://taskfile.dev/usage/#output-syntax
output: prefixed

# ColdStorage command surface — ONE assembled SSOT file (no go-task `includes:`).
# CORE cross-cutting tasks + per-domain blocks namespaced by component:
#   daemon:*          → the Swift core / container dev loop (domain: coldstorage/)
#   tf:coldstorage:*  → infra (domain: infra/coldstorage) — Terragrunt, ENV-scoped, shared first
#
# NAMING: tasks designed to run ON THE MAC (launchd/Keychain/codesign/Electron GUI/PhotoKit) carry a
# `mac` segment right after their domain — `daemon:mac:*`, `ui:mac:*`. Everything else runs in the
# devcontainer (or anywhere). `[devcontainer]` desc tags mark tasks that must NOT run on the Mac.
#
# TWO WAYS TO RUN `coldstored` — pick the one matching what you're doing, not both at once:
#
#   (There used to be a third: a local "dev sandbox" against a fake AWS (MinIO), with its own identity
#   mode in coldstored. It's gone — retired 2026-07-14. It proved nothing the test suite doesn't prove
#   deterministically (`daemon:test` covers the full archive→restore round trip, resume, and the memory
#   bounds, with no server), while carrying a second identity path into a security-sensitive daemon and
#   a whole parallel run mode to keep working. Iterate with `daemon:test`; run the app against real
#   staging AWS with `app:mac:run:staging-local`.)
#
#   1. YOUR REAL BACKGROUND DAEMON (real AWS/Deep Archive, always-on)
#        daemon:mac:bootstrap (once) → then it just runs; drive/watch it via daemon:mac:live / ui:mac:live
#        A launchd LaunchAgent — starts at login, restarts on crash. This IS your day-to-day backup
#        service. Leave it running; you don't re-bootstrap it to "start" it.
#
#   2. THE PACKAGED APP (what a real future customer downloads)
#        ui:mac:package (+ ui:mac:package:sign-adhoc) → open the built ColdStorage.app → ui:mac:package:doctor
#        Bundles + spawns its OWN coldstored, Finder-launched with no shell env — tests the actual
#        end-user experience (Photos permission grant, etc.), not day-to-day dogfooding.
#        ⚠ COLLIDES with #1 — both use the SAME ~/Library/Application Support/ColdStorage (same
#        socket/journal). `task daemon:mac:uninstall` before testing this; `task daemon:mac:bootstrap` again
#        afterward to bring your real daemon (#1) back. (Temporary: once packaging's background-run/
#        Tray UX lands, the packaged app replaces #1 outright and this toggle goes away.)
vars:
  AWS_PROFILE: "pharmer"
  # Pinned for reproducibility — bump deliberately. Used by `task scan` (leak guard).
  GITLEAKS_IMAGE: "ghcr.io/gitleaks/gitleaks:v8.30.1"

dotenv:
  - .env
  - .env.vercel

tasks:
  default:
    cmds:
      - task --list-all

  # ------------------------------------------------------------------ AWS identity (core)
  login:
    desc: Log in to AWS SSO
    requires:
      vars: [AWS_PROFILE]
    cmds:
      - aws sso login --profile {{.AWS_PROFILE}}

  check-aws-identity:
    desc: Fail early if the AWS profile isn't logged in
    requires:
      vars: [AWS_PROFILE]
    silent: true
    cmds:
      - |
        if ! aws sts get-caller-identity --profile {{.AWS_PROFILE}}; then
          echo "\nYour '{{.AWS_PROFILE}}' AWS profile is not logged in. Run 'task login'."
          exit 1
        fi

  # ------------------------------------------------------------------ daemon (domain: coldstorage/)
  # Native — no Docker. Swift toolchain (swiftly) + libsodium.
  # `task daemon:setup` installs them if missing; the devcontainer post-create does it on rebuild.
  daemon:setup:
    desc: Install the Swift toolchain (Linux) + libsodium (Linux) if missing (idempotent)
    cmds:
      - bash .devcontainer/install-swift.sh
      - task: _libsodium-dev

  _libsodium-dev:
    # libsodium the C library — the Linux systemLibrary target swift-sodium's Argon2id path (ZeroKnowledgeKeys,
    # PROD.md Phase 3) needs. Apple platforms instead get a prebuilt XCFramework bundled in the SPM package
    # itself, so this is a no-op there. NOT `apt install libsodium-dev`: Ubuntu 24.04 ships 1.0.18, which
    # predates AEGIS (added 1.0.19) that swift-sodium's Linux binding references — the build fails with
    # "cannot find 'crypto_aead_aegis128l_...' in scope". Build+install a current release from source
    # instead ("get current upstream directly", rather than apt's stale build). Idempotent
    # via status (pkg-config version check); a dep of daemon:setup so a fresh devcontainer needs no manual step.
    internal: true
    vars:
      VERSION: "1.0.22"
    status:
      - '[ "$(uname -s)" != "Linux" ] || pkg-config --atleast-version=1.0.19 libsodium'
    cmds:
      - |
        [ "$(uname -s)" != "Linux" ] && exit 0
        set -e
        cd /tmp
        curl -fsSL "https://github.com/jedisct1/libsodium/releases/download/{{.VERSION}}-RELEASE/libsodium-{{.VERSION}}.tar.gz" -o libsodium.tar.gz
        tar xzf libsodium.tar.gz
        cd "libsodium-{{.VERSION}}"
        ./configure --prefix=/usr/local
        make -j"$(nproc)"
        sudo make install
        sudo ldconfig
        cd /tmp && rm -rf libsodium.tar.gz "libsodium-{{.VERSION}}"
        echo "installed libsodium {{.VERSION}} to /usr/local (was: apt's 1.0.18, too old for AEGIS)"

  daemon:unlock:
    desc: "Clear a stale SwiftPM build lock (the 0%-CPU 'hung build' footgun) — only if no build/test is live."
    dir: coldstorage
    cmds:
      - |
        if pgrep -x swift-build >/dev/null 2>&1 || pgrep -x swift-test >/dev/null 2>&1; then
          echo "swift build/test is running — leaving .build/.lock alone"
        elif [ -f .build/.lock ]; then
          rm -f .build/.lock && echo "removed stale .build/.lock"
        fi

  # ── `.build` IS SHARED WITH THE MAC. The workspace is bind-mounted from the macOS host, so
  #    `coldstorage/.build/` is literally the same directory in here and out there. SwiftPM keeps per-triple
  #    subdirs, but `.build/release` and `.build/debug` are SYMLINKS it repoints at whichever platform built
  #    last — so a container build swings them at an `aarch64-unknown-linux-gnu` ELF, and the Mac's launchd
  #    then refuses to exec what it thinks is the daemon (`Bootstrap failed: 5`, 2026-07-14). Same class of
  #    bug the devcontainer already solves for `ui/node_modules` by giving it a container-only volume.
  #    So: on Linux, build into our OWN scratch path and leave the Mac's `.build` alone entirely.
  daemon:build:dev:
    desc: "Build the Swift core — DEBUG (any OS). First run fetches deps (a few minutes). For the prod release build, see daemon:mac:install."
    dir: coldstorage
    deps: [daemon:unlock] # clear a stale lock left by a previously-killed build
    cmds:
      - swift build $(if [ "$(uname -s)" = "Linux" ]; then echo "--scratch-path .build-linux"; fi)
  daemon:test:
    desc: Run the portable Core tests (swift-testing — no XCTest/CFRunLoop hang)
    dir: coldstorage
    deps: [daemon:unlock]
    # --no-parallel is LOAD-BEARING, not a speed knob. StreamBackpressureTests asserts on this process's
    # OWN resident memory (the only way to catch an unbounded stream buffer — every functional assertion
    # passes while it happens). Swift Testing runs suites concurrently by default, and ZeroKnowledgeKeysTests
    # exercises Argon2id at production tuning — a deliberately memory-HARD KDF. A neighbour allocating
    # hundreds of MiB inside the process you are measuring makes the measurement meaningless (it reported a
    # 260 MiB "leak" that was Argon2id's). The whole suite is ~2s serial; the trustworthy number is worth it.
    cmds:
      # See the `.build` note above daemon:build:dev — on Linux we build into our own scratch path so the
      # container never touches the Mac's `.build` (whose `release` symlink launchd depends on).
      - swift test --no-parallel $(if [ "$(uname -s)" = "Linux" ]; then echo "--scratch-path .build-linux"; fi)

  daemon:mac:reset:local:
    desc: "DESTRUCTIVE: wipe the local per-user archive state — every signed-in account's journal (file index + watched-folder registry), scratch and status, under <data dir>/users/. Keeps config.json, the app's sign-in session, the MasterKey escrow (vault.json) and logs. Stop the daemon/app first. Run this once after the UserSession refactor (2026-07-13): the OLD machine-wide coldstore.sqlite is exactly the file that leaked across accounts, and it is now orphaned — this deletes it."
    interactive: true
    vars:
      DATA_DIR: "{{.HOME}}/Library/Application Support/ColdStorage"
    cmds:
      - |
        if pgrep -fl coldstored >/dev/null 2>&1; then
          echo "✗ coldstored is running — stop it first (quit ColdStorage.app / task daemon:mac:uninstall / task dev:stop)"; exit 1
        fi
        echo "This deletes the LOCAL archive index for EVERY account on this Mac (files list + watched folders start empty):"
        echo "  {{.DATA_DIR}}/users/            (per-user journals, scratch, status — the post-refactor layout)"
        echo "  {{.DATA_DIR}}/{coldstore.sqlite,status.json,staging/}   (the PRE-refactor machine-wide state — the one that leaked)"
        printf "type 'reset' to continue: "
        read -r answer
        [ "$answer" = "reset" ] || { echo "aborted — nothing deleted"; exit 1; }
        rm -rf "{{.DATA_DIR}}/users"
        # The pre-refactor layout. Nothing reads these any more; leaving them behind would just be a stale
        # copy of one account's file index sitting on disk.
        rm -f "{{.DATA_DIR}}/coldstore.sqlite" "{{.DATA_DIR}}/status.json" "{{.DATA_DIR}}/kek.bin"
        rm -rf "{{.DATA_DIR}}/staging"
        rm -f "{{.ROOT_DIR}}/coldstorage/coldstore.sqlite"
        echo "✓ local archive state wiped. Re-add watched folders in Settings after the next launch."

  daemon:mac:sim-new-device:
    desc: "Simulate signing in on a FRESH computer (PROD.md Phase 5b gate): delete this device's zero-knowledge MasterKey escrow (vault.json) so the next launch has no cached key and must prompt for the recovery code — proving the new-device unlock path without a second Mac. Keeps the sign-in session + the account's server-side key-blob, so it's a targeted 'forget my encryption key', not a full sign-out. QUIT the app first (it rewrites vault.json while running)."
    vars:
      DATA_DIR: "{{.HOME}}/Library/Application Support/ColdStorage"
    cmds:
      - |
        if [ ! -f "{{.DATA_DIR}}/vault.json" ]; then
          echo "no {{.DATA_DIR}}/vault.json — this device has no cached MasterKey (already 'fresh'). Nothing to do."; exit 0
        fi
        rm -f "{{.DATA_DIR}}/vault.json"
        echo "✓ forgot this device's MasterKey escrow. Next launch: sign in → you'll be asked for your recovery code."

  daemon:gate-test:
    desc: "[devcontainer] ADVERSARIAL test of the per-user S3 boundary (PROD.md P2/P5a gate): mints a throwaway Cognito user (admin-create + password — USER_AUTH accepts PASSWORD as a factor, no inbox needed), exchanges its ID token for real STS creds via the identity pool, then proves own-prefix PUT is ALLOWED while a cross-prefix PUT and a GET of a real foreign object are DENIED. Cleans up the user/identity/probe object after."
    deps: [check-aws-identity]
    dir: infra/coldstorage/live/production
    cmds:
      - |
        set -u
        REGION=$(terragrunt output -raw aws_region)
        BUCKET=$(terragrunt output -raw bucket_name)
        POOL=$(terragrunt output -raw cognito_user_pool_id)
        CLIENT=$(terragrunt output -raw cognito_user_pool_client_id)
        IDPOOL=$(terragrunt output -raw cognito_identity_pool_id)
        EMAIL="gate-test@coldstorage.sh"
        PASS="$(openssl rand -base64 24)aA1!"
        TMP=$(mktemp -d)
        json() { python3 -c "import json,sys;print(json.load(sys.stdin)$1)"; }
        cip() { curl -s "https://cognito-idp.$REGION.amazonaws.com/" -H "Content-Type: application/x-amz-json-1.0" -H "X-Amz-Target: AWSCognitoIdentityProviderService.$1" -d "$2"; }
        cid() { curl -s "https://cognito-identity.$REGION.amazonaws.com/" -H "Content-Type: application/x-amz-json-1.1" -H "X-Amz-Target: AWSCognitoIdentityService.$1" -d "$2"; }
        IDENTITY=""
        cleanup() {
          aws cognito-idp admin-delete-user --user-pool-id "$POOL" --username "$EMAIL" --profile {{.AWS_PROFILE}} 2>/dev/null || true
          [ -n "$IDENTITY" ] && aws cognito-identity delete-identities --identity-ids-to-delete "$IDENTITY" --profile {{.AWS_PROFILE}} --region "$REGION" > /dev/null 2>&1 || true
          [ -n "$IDENTITY" ] && aws s3 rm "s3://$BUCKET/blobs/$IDENTITY/gate-probe.bin" --profile {{.AWS_PROFILE}} 2>/dev/null || true
          rm -rf "$TMP"
        }
        trap cleanup EXIT
        echo "── mint throwaway user ──"
        aws cognito-idp admin-create-user --user-pool-id "$POOL" --username "$EMAIL" --message-action SUPPRESS \
          --user-attributes Name=email,Value="$EMAIL" Name=email_verified,Value=true --profile {{.AWS_PROFILE}} > /dev/null
        aws cognito-idp admin-set-user-password --user-pool-id "$POOL" --username "$EMAIL" --password "$PASS" --permanent --profile {{.AWS_PROFILE}}
        echo "── sign it in (USER_AUTH / PASSWORD factor, plain HTTPS — same lane the app's 5b email-OTP uses) ──"
        AUTH=$(cip InitiateAuth "{\"AuthFlow\":\"USER_AUTH\",\"ClientId\":\"$CLIENT\",\"AuthParameters\":{\"USERNAME\":\"$EMAIL\",\"PASSWORD\":\"$PASS\",\"PREFERRED_CHALLENGE\":\"PASSWORD\"}}")
        IDTOKEN=$(printf %s "$AUTH" | json "['AuthenticationResult']['IdToken']" 2>/dev/null) || { echo "✗ sign-in failed: $AUTH"; exit 1; }
        echo "── exchange for STS creds (identity pool) ──"
        LOGINS="{\"cognito-idp.$REGION.amazonaws.com/$POOL\":\"$IDTOKEN\"}"
        IDENTITY=$(cid GetId "{\"IdentityPoolId\":\"$IDPOOL\",\"Logins\":$LOGINS}" | json "['IdentityId']")
        CREDS=$(cid GetCredentialsForIdentity "{\"IdentityId\":\"$IDENTITY\",\"Logins\":$LOGINS}")
        export AWS_ACCESS_KEY_ID=$(printf %s "$CREDS" | json "['Credentials']['AccessKeyId']")
        export AWS_SECRET_ACCESS_KEY=$(printf %s "$CREDS" | json "['Credentials']['SecretKey']")
        export AWS_SESSION_TOKEN=$(printf %s "$CREDS" | json "['Credentials']['SessionToken']")
        unset AWS_PROFILE; echo "test identity: $IDENTITY"
        echo "gate" > "$TMP/probe"
        FOREIGN_KEY=$(aws s3api list-objects-v2 --bucket "$BUCKET" --prefix blobs/ --query "Contents[?!starts_with(Key, 'blobs/$IDENTITY/')] | [0].Key" --output text --profile {{.AWS_PROFILE}})
        PASS_ALL=1
        echo "── assert 1: PUT own prefix → ALLOWED ──"
        if aws s3api put-object --bucket "$BUCKET" --key "blobs/$IDENTITY/gate-probe.bin" --body "$TMP/probe" --region "$REGION" > /dev/null 2>"$TMP/e1"; then
          echo "✓ allowed"; else echo "✗ FAIL — own-prefix PUT denied: $(cat "$TMP/e1")"; PASS_ALL=0; fi
        echo "── assert 2: PUT another user's prefix → DENIED ──"
        if aws s3api put-object --bucket "$BUCKET" --key "blobs/ca-central-1:00000000-dead-beef-0000-000000000000/gate-probe.bin" --body "$TMP/probe" --region "$REGION" > /dev/null 2>"$TMP/e2"; then
          echo "✗ FAIL — cross-prefix PUT was ALLOWED (boundary broken)"; PASS_ALL=0
        else grep -q "AccessDenied" "$TMP/e2" && echo "✓ AccessDenied" || { echo "✗ FAIL — denied but not AccessDenied: $(cat "$TMP/e2")"; PASS_ALL=0; }; fi
        if [ "$FOREIGN_KEY" != "None" ] && [ -n "$FOREIGN_KEY" ]; then
          echo "── assert 3: GET a real foreign object ($FOREIGN_KEY) → DENIED ──"
          if aws s3api get-object --bucket "$BUCKET" --key "$FOREIGN_KEY" "$TMP/stolen" --region "$REGION" > /dev/null 2>"$TMP/e3"; then
            echo "✗ FAIL — read another user's object (boundary broken)"; PASS_ALL=0
          else grep -q "AccessDenied" "$TMP/e3" && echo "✓ AccessDenied" || { echo "✗ FAIL — denied but not AccessDenied: $(cat "$TMP/e3")"; PASS_ALL=0; }; fi
        else
          echo "── assert 3 skipped: no foreign object in the vault to probe ──"
        fi
        [ "$PASS_ALL" = "1" ] && echo "GATE PASSED — per-user boundary holds" || { echo "GATE FAILED"; exit 1; }

  daemon:reset:vault:
    desc: "[devcontainer] DESTRUCTIVE: delete every object under blobs/ in the REAL production vault (the pre-auth dogfood uploads at blobs/<hash> AND any per-user blobs/<identityId>/ objects). Confirm by typing the bucket name. Deep Archive objects delete fine (early-delete fee is pennies at dogfood scale)."
    interactive: true
    deps: [check-aws-identity]
    dir: infra/coldstorage/live/production
    cmds:
      - |
        bucket=$(terragrunt output -raw bucket_name)
        count=$(aws s3api list-objects-v2 --bucket "$bucket" --prefix blobs/ --query 'KeyCount' --output text --profile {{.AWS_PROFILE}})
        echo "vault: s3://$bucket — $count object(s) under blobs/ will be PERMANENTLY deleted"
        [ "$count" = "0" ] && { echo "nothing to delete"; exit 0; }
        printf "type the bucket name ('%s') to continue: " "$bucket"
        read -r answer
        [ "$answer" = "$bucket" ] || { echo "aborted — nothing deleted"; exit 1; }
        aws s3 rm "s3://$bucket/blobs/" --recursive --profile {{.AWS_PROFILE}} --only-show-errors
        echo "✓ vault emptied (blobs/)."

  # ── daemon:mac:*-ipc — drive the INSTALLED daemon over its control socket, i.e. the same commands the
  #    UI issues, without the UI. ⚠ These now hit your REAL vault: the MinIO dev sandbox they used to talk
  #    to is gone (retired 2026-07-14), so there is no safe fake to point them at any more.
  daemon:mac:deposit-ipc:
    desc: 'Deposit (ad-hoc drop-to-upload) over the running daemon''s socket: SRC=/abs/path [DEST=folder] [CONFLICTS=''{"dest/name":"keepBoth"}'']. Archives the path(s) once, NO watched source — the same command the UI''s drag-drop issues. CONFLICTS is the JSON Keep Both / Replace / Skip map (see daemon:mac:preview-deposit-ipc). Fire-and-forget; check `daemon:mac:live -- listFiles`.'
    dir: coldstorage
    vars:
      SOCK: '{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock'
    cmds:
      - swift run coldstorectl {{.SOCK}} deposit src={{.SRC}} dest={{.DEST | default ""}} {{if .CONFLICTS}}'conflicts={{.CONFLICTS}}'{{end}}

  daemon:mac:logs:
    desc: "Tail the installed daemon's stdout+stderr logs (live). Shows PhotoKitResolver auth/resolve diagnostics, deposit errors, etc."
    dir: coldstorage
    vars:
      DATA_DIR: "{{.HOME}}/Library/Application Support/ColdStorage"
    cmds:
      - tail -n 40 -f "{{.DATA_DIR}}/coldstored.out.log" "{{.DATA_DIR}}/coldstored.err.log"

  daemon:mac:memory:
    desc: "Watch the installed daemon's memory while it uploads — the SHAPE is the diagnosis. It should stay FLAT (~100-200 MB) no matter how many files or how big; the engine holds one 64 MiB part at a time and writes nothing to disk. A 1000-file deposit peaked at 1.7 GB on 2026-07-14, which is what this exists to explain. Reads the RSS the daemon logs after the scan and after every part, so you never have to squint at Activity Monitor. Ctrl-C to stop."
    dir: coldstorage
    vars:
      DATA_DIR: "{{.HOME}}/Library/Application Support/ColdStorage"
      LIMIT: '{{.LIMIT | default "600"}}' # MB — above this, memory is tracking the upload rather than bounding it
    cmds:
      - |
        echo "── coldstored memory (limit {{.LIMIT}} MB) ─────────────────────────────"
        echo "   flat across parts = bounded (what we want)"
        echo "   climbing with each part = something is retaining every part"
        echo "   climbing during the scan = the hashing pass is holding the reads"
        echo "──────────────────────────────────────────────────────────────────────"
        # The daemon reports its OWN RSS (ProcessMemory) — no sampling race, one line per part.
        tail -n 200 -f "{{.DATA_DIR}}/coldstored.err.log" \
          | grep --line-buffered -E "RSS [0-9]+ MB" \
          | while IFS= read -r line; do
              mb=$(printf '%s' "$line" | sed -n 's/.*RSS \([0-9]*\) MB.*/\1/p')
              if [ -n "$mb" ] && [ "$mb" -gt {{.LIMIT}} ]; then
                printf "\033[31m%s   ⚠ above {{.LIMIT}} MB\033[0m\n" "$line"
              else
                printf "%s\n" "$line"
              fi
            done

  daemon:mac:logs:clear:
    desc: "Truncate the installed daemon's logs in place — a clean slate before reproducing an issue, WITHOUT reinstalling. (daemon:mac:install also resets them.) The daemon keeps writing to the same files."
    dir: coldstorage
    vars:
      DATA_DIR: "{{.HOME}}/Library/Application Support/ColdStorage"
    cmds:
      - ': > "{{.DATA_DIR}}/coldstored.out.log"; : > "{{.DATA_DIR}}/coldstored.err.log"'
      - 'echo "cleared daemon logs"'

  daemon:mac:reset-photos-tcc:
    desc: "Reset the daemon's Photos permission so the next depositPhotos re-prompts from scratch (use if you granted Limited instead of Full, or to re-test the grant). Derives the identifier from the signed binary, so it always matches the installed daemon."
    dir: coldstorage
    cmds:
      - |
        # The TCC grant keys to the binary's code-signing Identifier (pinned to com.theadpharm.coldstored in
        # daemon:mac:install) — read it straight from the binary so this can't drift. Also reset the old default
        # "coldstored" identifier, in case a pre-pinning grant is lingering. A "No such bundle identifier"
        # error just means there's no grant to clear (already reset / never granted) — not a failure.
        id=$(codesign -dv .build/release/coldstored 2>&1 | sed -n 's/^Identifier=//p')
        for client in "$id" coldstored; do
          [ -n "$client" ] || continue
          tccutil reset Photos "$client" 2>&1 | sed "s/^/[$client] /" || true
        done
        echo "done — the next photo deposit re-prompts; choose ALL Photos (Full), not Limited"

  daemon:mac:photo-picker:
    desc: "Run the native Photos picker helper standalone (no daemon, no UI) — opens the system picker and prints the selection as JSON {id, name} objects. Sanity-checks option B before wiring it through the UI."
    dir: coldstorage
    cmds:
      - swift run coldstore-photo-picker

  daemon:mac:deposit-photos-ipc:
    desc: "Explicit photo deposit over the running daemon's socket: IDS='id1\\nid2' (newline-joined Photos localIdentifiers) [DEST=folder] [CONFLICTS='{\"dest/name\":\"keepBoth\"}']. Archives ONLY those picked photos (never the whole library) — the same command the UI's photo picker issues. CONFLICTS is the JSON collision-resolution map. macOS only (PhotoKit); off-Mac the daemon emits an error event. Check `daemon:mac:live -- listFiles`."
    dir: coldstorage
    vars:
      SOCK: '{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock'
    cmds:
      - swift run coldstorectl {{.SOCK}} depositPhotos assetIds={{.IDS}} dest={{.DEST | default ""}} {{if .CONFLICTS}}'conflicts={{.CONFLICTS}}'{{end}}

  daemon:mac:preview-deposit-ipc:
    desc: "Dry-run a deposit's placement over the running daemon's socket (no upload): SRC=/abs/path OR IDS='id1\\nid2', plus [DEST=folder]. Prints each target's vault relativePath + whether it already EXISTS (a collision the UI prompts on). The same `previewDeposit` the UI runs before showing Keep Both / Replace / Skip."
    dir: coldstorage
    vars:
      SOCK: '{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock'
    cmds:
      - swift run coldstorectl {{.SOCK}} previewDeposit dest={{.DEST | default ""}} {{if .SRC}}src={{.SRC}}{{end}} {{if .IDS}}assetIds={{.IDS}}{{end}}

  daemon:mac:move-ipc:
    desc: "Reorganize over the running daemon's socket — move OR rename: FROM=<vault/path> TO=<new/vault/path>. A cheap journal relativePath edit (no S3, no thaw); the same command the UI's move/rename issues. Check `daemon:mac:live -- listFiles`."
    dir: coldstorage
    vars:
      SOCK: '{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock'
    cmds:
      - swift run coldstorectl {{.SOCK}} movePath from={{.FROM}} to={{.TO}}

  daemon:mac:delete-ipc:
    desc: "Delete (tombstone) over the running daemon's socket: PATH=<vault/path> (file or folder). Drops from listFiles; bytes aren't reclaimed (deferred repack/GC). Check `daemon:mac:live -- listFiles`."
    dir: coldstorage
    vars:
      SOCK: '{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock'
    cmds:
      - swift run coldstorectl {{.SOCK}} deletePath path={{.PATH}}

  daemon:mac:exclude-ipc:
    desc: "Manage scan exclude patterns over the running daemon's socket: ADD=<glob> or REMOVE=<glob> (omit both to just list). gitignore-style — bare names match at any depth, globs use */?. The next scan/deposit skips matches. Quote globs so the shell doesn't expand them, e.g. ADD='*.log'."
    dir: coldstorage
    vars:
      SOCK: '{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock'
    cmds:
      - "{{if .ADD}}swift run coldstorectl {{.SOCK}} addExclude pattern={{.ADD}}{{end}}"
      - "{{if .REMOVE}}swift run coldstorectl {{.SOCK}} removeExclude pattern={{.REMOVE}}{{end}}"
      - swift run coldstorectl {{.SOCK}} listExcludes

  daemon:mac:live:
    desc: "Drive the INSTALLED launchd daemon (real prod AWS / Deep Archive), e.g. `task daemon:mac:live -- getStatus` · `-- addSource path=/abs/dir` · `-- triggerNow` · `-- watch`. Uses the release binary built by daemon:mac:install."
    dir: coldstorage
    vars:
      SOCK: "{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock"
    cmds:
      - test -S "{{.SOCK}}" || { echo "no installed daemon socket at {{.SOCK}} — run task daemon:mac:bootstrap first"; exit 1; }
      - ./.build/release/coldstorectl "{{.SOCK}}" {{.CLI_ARGS | default "getStatus"}}

  daemon:mac:verify-aws:
    desc: 'HEAD a single LIVE vault blob directly in S3 (bypasses the daemon) to confirm StorageClass=DEEP_ARCHIVE + see the Restore (thaw) status. BLOB=<blobId> (the hash from listFiles). Uses head-object, so it stays within the daemon''s least-priv GetObject grant (no ListBucket). Also the way to poll a thaw: re-run until Restore shows ongoing-request="false".'
    dir: coldstorage
    vars:
      CREDS: "{{.ROOT_DIR}}/coldstorage/.local/daemon-creds.env"
    cmds:
      - |
        [ -f "{{.CREDS}}" ] && { set -a; . "{{.CREDS}}"; set +a; }
        bucket="${COLDSTORE_BUCKET:?missing COLDSTORE_BUCKET — run tf:coldstorage:creds-export in the devcontainer}"
        region="${AWS_REGION:-ca-central-1}"
        blob="{{.BLOB}}"; : "${blob:?pass BLOB=<blobId> (the hash from task daemon:mac:live -- listFiles)}"
        echo "── HEAD s3://${bucket}/blobs/${blob} ──"
        aws s3api head-object --bucket "$bucket" --key "blobs/${blob}" \
          --query '{StorageClass:StorageClass,Size:ContentLength,Restore:Restore}' \
          --output table --profile coldstorage --region "$region"

  daemon:mac:restore-wait:
    desc: "Hands-off Deep Archive restore: re-fires `restore` against the INSTALLED daemon every INTERVAL until state=restored, then shows the recovered file. Start it and walk away (Glacier Standard thaw is ~12h). FILE=<id> OUT=<path> [TIER=standard] [INTERVAL=900]. Idempotent — re-issues no duplicate thaw while in progress."
    dir: coldstorage
    vars:
      SOCK: "{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock"
      OUT: '{{.OUT | default "/tmp/coldstorage-restore-test.out"}}'
      TIER: '{{.TIER | default "standard"}}'
      INTERVAL: '{{.INTERVAL | default "900"}}'
    cmds:
      - test -S "{{.SOCK}}" || { echo "no installed daemon socket at {{.SOCK}} — run task daemon:mac:bootstrap first"; exit 1; }
      - |
        file="{{.FILE}}"; : "${file:?pass FILE=<id> (from task daemon:mac:live -- listFiles)}"
        ctl='./.build/release/coldstorectl'; sock="{{.SOCK}}"
        while :; do
          out="$($ctl "$sock" restore "file=$file" "out={{.OUT}}" "tier={{.TIER}}")"
          echo "[$(date '+%H:%M:%S')] $out"
          case "$out" in
            *'"state":"restored"'*) echo "✓ restored → {{.OUT}}"; break ;;
          esac
          sleep {{.INTERVAL}}
        done
        echo "── recovered file (first 40 lines) ──"
        head -n 40 "{{.OUT}}"

  daemon:mac:install:
    desc: "Build release + install the coldstored LaunchAgent (RunAtLoad/KeepAlive)."
    dir: coldstorage
    vars:
      DATA_DIR: "{{.HOME}}/Library/Application Support/ColdStorage"
      PLIST: "{{.HOME}}/Library/LaunchAgents/com.theadpharm.coldstored.plist"
    cmds:
      # Photos access prerequisite (explicit photo-deposit path): the Info.plist is embedded into coldstored
      # at link time via Package.swift (-sectcreate, macOS-only), and we codesign with a STABLE identity
      # below — TCC keys the Photos grant to (CFBundleIdentifier + signing identity), so a changing identity
      # resets the grant. Recipe proven in phase0-photos-spike. Folder/file deposit needs neither, but
      # signing is harmless for them, so we always sign — one code path, and photos "just work".
      - swift build -c release
      - |
        # Default to the first "Apple Development" identity in the Keychain; override with IDENTITY="…".
        # Keep it CONSTANT across releases or macOS re-prompts for Photos (the TCC grant is identity-keyed).
        identity="{{.IDENTITY}}"
        if [ -z "$identity" ]; then
          identity=$(security find-identity -v -p codesigning | sed -n 's/.*"\(Apple Development: [^"]*\)".*/\1/p' | head -1)
        fi
        if [ -z "$identity" ]; then
          echo "No Apple Development identity in your Keychain — pass one: task daemon:mac:install IDENTITY=\"Apple Development: …\""; exit 1
        fi
        # --identifier pins the code-signing identifier to the bundle id (== launchd Label). TCC keys the
        # Photos grant to this identifier (NOT the embedded CFBundleIdentifier); without pinning, codesign
        # defaults it to the basename "coldstored", so `tccutil reset Photos com.theadpharm.coldstored`
        # wouldn't match. Pinning makes the grant + reset + launchd label all consistent.
        # NOT `.build/release/coldstored`. That is a SYMLINK, and SwiftPM repoints it at whichever platform
        # built last — while this repo's `.build/` is SHARED with the Linux devcontainer over the bind mount.
        # A container-side `swift build` swings it at an `aarch64-unknown-linux-gnu` ELF, and then launchd is
        # handed a path that resolves to a Linux binary: `Bootstrap failed: 5: Input/output error`, which is
        # launchd's opaque way of saying "invalid or missing Program/ProgramArguments" (2026-07-14).
        # `--show-bin-path` reports the REAL platform-specific directory, with no symlink to race over.
        bin="$(swift build -c release --show-bin-path)/coldstored"
        [ -x "$bin" ] || { echo "✗ no release binary at $bin — the build didn't produce it"; exit 1; }
        codesign --force --sign "$identity" --identifier com.theadpharm.coldstored "$bin"
        echo "signed coldstored as com.theadpharm.coldstored with: $identity  (keep this identity STABLE — TCC keys the Photos grant to it)"
        echo "  binary: $bin"
      - mkdir -p "{{.DATA_DIR}}" "{{.HOME}}/Library/LaunchAgents"
      - |
        # Bucket/region come from the handoff file (written by `task tf:coldstorage:creds-export` in the
        # devcontainer — the SSOT is the infra outputs). Env vars still override.
        CREDS="{{.ROOT_DIR}}/coldstorage/.local/daemon-creds.env"
        [ -f "$CREDS" ] && { set -a; . "$CREDS"; set +a; }
        bucket="${COLDSTORE_BUCKET:-coldstorage}"
        region="${AWS_REGION:-us-east-1}"
        profile="${COLDSTORE_AWS_PROFILE:-coldstorage}"   # creds resolve via this profile's credential_process (task daemon:mac:creds)
        # Cognito (multi-user prod) is REQUIRED for the installed daemon: without it coldstored refuses to
        # start (there is no silent fall-back to the shared all-access IAM user any more). Fail HERE, at
        # install time, with the fix in hand — rather than letting launchd bootstrap a daemon that exits 2
        # into a log file nobody reads.
        cognito_pool_id="${COLDSTORE_COGNITO_IDENTITY_POOL_ID:-}"
        cognito_provider="${COLDSTORE_COGNITO_USER_POOL_PROVIDER:-}"
        if [ -z "$cognito_pool_id" ] || [ -z "$cognito_provider" ]; then
          echo "✗ Cognito is not configured — the daemon would refuse to start."
          echo "  Re-export the infra handoff (in the devcontainer): task tf:coldstorage:creds-export"
          echo "  Then re-run: task daemon:mac:install"
          exit 1
        fi
        # Same reason as the codesign step: resolve the REAL bin dir, never the shared `.build/release` symlink.
        sed -e "s#__BINARY__#$(swift build -c release --show-bin-path)/coldstored#g" \
            -e "s#__DATA_DIR__#{{.DATA_DIR}}#g" \
            -e "s#__SOCKET__#{{.DATA_DIR}}/coldstored.sock#g" \
            -e "s#__BUCKET__#${bucket}#g" \
            -e "s#__REGION__#${region}#g" \
            -e "s#__PROFILE__#${profile}#g" \
            -e "s#__COGNITO_IDENTITY_POOL_ID__#${cognito_pool_id}#g" \
            -e "s#__COGNITO_USER_POOL_PROVIDER__#${cognito_provider}#g" \
            launchd/com.theadpharm.coldstored.plist.template > "{{.PLIST}}"
        echo "wired: bucket=${bucket} region=${region} profile=${profile} cognito=${cognito_pool_id:+configured}${cognito_pool_id:-not configured}"
      # `bootout` is ASYNCHRONOUS — it returns before launchd has finished tearing the job down, and with
      # KeepAlive set the old instance may still be respawning. Bootstrapping into that window fails with
      # launchd's famously unhelpful `Bootstrap failed: 5: Input/output error`. So: ask it to go, then WAIT
      # until it's actually gone before putting the new one in its place.
      - |
        launchctl bootout "gui/$(id -u)/com.theadpharm.coldstored" 2>/dev/null || true
        for _ in $(seq 1 25); do
          launchctl print "gui/$(id -u)/com.theadpharm.coldstored" >/dev/null 2>&1 || exit 0
          sleep 0.2
        done
        echo "⚠ the old daemon is still registered after 5s — bootstrap may fail; continuing anyway"
      # Fresh logs each install: launchd APPENDS to StandardOut/ErrorPath (never truncates across
      # restarts), so a debugging run would otherwise be read against stale lines from prior runs. The old
      # daemon is booted out above, so its log fd is closed — safe to truncate before the new one starts.
      - ': > "{{.DATA_DIR}}/coldstored.out.log"; : > "{{.DATA_DIR}}/coldstored.err.log"'
      # DON'T just die on a launchd error. `Bootstrap failed: 5: Input/output error` is launchd's generic
      # noise for "I could not validate or execute your Program/ProgramArguments" — it names neither the
      # program nor the problem, and there is nothing in it to act on. So when it fails, ASK the three
      # questions that actually distinguish the causes, right here, while the context is in hand.
      - |
        if launchctl bootstrap "gui/$(id -u)" "{{.PLIST}}"; then
          echo "installed → {{.PLIST}}  (socket: {{.DATA_DIR}}/coldstored.sock; logs reset)"
          exit 0
        fi
        bin="$(swift build -c release --show-bin-path)/coldstored"
        echo ""
        echo "─────────────────────────────────────────────────────────────────────────────"
        echo "✗ launchd refused to load the daemon. Its error code means 'invalid or missing"
        echo "  Program/ProgramArguments' — i.e. it could not use the binary it was pointed at."
        echo "─────────────────────────────────────────────────────────────────────────────"
        echo "1. Is the plist valid?"
        plutil -lint "{{.PLIST}}" 2>&1 | sed 's/^/     /'
        echo "2. Is the binary there, and executable?"
        if [ -x "$bin" ]; then
          ls -l "$bin" | sed 's/^/     /'
          codesign -dv "$bin" 2>&1 | grep -E "Identifier|Signature" | sed 's/^/     /'
        else
          echo "     ✗ MISSING or not executable: $bin"
          echo "       → the release build didn't produce it. Re-run: task daemon:mac:install"
        fi
        echo "3. Is it still registered from a previous run?"
        if launchctl print "gui/$(id -u)/com.theadpharm.coldstored" >/dev/null 2>&1; then
          echo "     ✗ YES — still loaded. Clear it, then re-run this task:"
          echo "       task daemon:mac:uninstall"
        else
          echo "     ✓ no — the domain is clean, so this isn't a stale-registration race."
        fi
        echo ""
        echo "  Daemon log (it may have started and exited):"
        tail -n 15 "{{.DATA_DIR}}/coldstored.err.log" 2>/dev/null | sed 's/^/     /' || echo "     (empty)"
        echo "─────────────────────────────────────────────────────────────────────────────"
        exit 1

  daemon:mac:creds:
    desc: "Seed the daemon's IAM-user creds into the login Keychain + wire the `coldstorage` AWS profile. Needs the handoff file — run `task tf:coldstorage:creds-export` in the devcontainer first."
    dir: coldstorage
    vars:
      # SCRIPT_DIR is a SPACE-FREE path on purpose: AWS splits `credential_process` on
      # whitespace, so the helper can't live under "…/Application Support/…".
      SCRIPT_DIR: "{{.HOME}}/.coldstorage"
      CREDS: "{{.ROOT_DIR}}/coldstorage/.local/daemon-creds.env"
    cmds:
      - mkdir -p "{{.SCRIPT_DIR}}" && chmod 700 "{{.SCRIPT_DIR}}"
      - |
        if [ ! -f "{{.CREDS}}" ]; then echo "missing {{.CREDS}} — run 'task tf:coldstorage:creds-export' in the devcontainer first"; exit 1; fi
        set -a; . "{{.CREDS}}"; set +a
        # Re-runnable: if the handoff file's secret was already stripped, fall back to the Keychain copy.
        akid="${DAEMON_AKID:-$(security find-generic-password -s coldstorage-aws-access-key-id     -w 2>/dev/null || true)}"
        secret="${DAEMON_SECRET:-$(security find-generic-password -s coldstorage-aws-secret-access-key -w 2>/dev/null || true)}"
        if [ -z "$akid" ] || [ -z "$secret" ]; then echo "no creds in {{.CREDS}} or Keychain — run 'task tf:coldstorage:creds-export' in the devcontainer first"; exit 1; fi
        # 1. secret + key id → login Keychain (encrypted; -U overwrites, so this doubles as rotate). security is macOS-only.
        security add-generic-password -a "$USER" -s coldstorage-aws-access-key-id     -w "$akid"   -U
        security add-generic-password -a "$USER" -s coldstorage-aws-secret-access-key -w "$secret" -U
        # 2. install the credential_process helper to the space-free path
        install -m 0755 launchd/coldstore-aws-credential-process.sh "{{.SCRIPT_DIR}}/coldstore-aws-credential-process.sh"
        # 3. wire the `coldstorage` profile. Prefer the aws CLI (also fixes a stale path on re-run); guarded append if absent.
        SCRIPT="{{.SCRIPT_DIR}}/coldstore-aws-credential-process.sh"
        if command -v aws >/dev/null 2>&1; then
          aws configure set profile.coldstorage.credential_process "$SCRIPT"
          aws configure set profile.coldstorage.region "$AWS_REGION"
        else
          cfg="$HOME/.aws/config"; mkdir -p "$HOME/.aws"; touch "$cfg"
          grep -q '^\[profile coldstorage\]' "$cfg" || printf '\n[profile coldstorage]\ncredential_process = %s\nregion = %s\n' "$SCRIPT" "$AWS_REGION" >> "$cfg"
        fi
        # 4. secret is in the Keychain now — strip it from the on-disk handoff (leave bucket/region/akid for daemon:mac:install)
        grep -v '^DAEMON_SECRET=' "{{.CREDS}}" > "{{.CREDS}}.tmp" && mv "{{.CREDS}}.tmp" "{{.CREDS}}" && chmod 600 "{{.CREDS}}"
        echo "✓ Keychain seeded; profile 'coldstorage' wired (region=$AWS_REGION, helper=$SCRIPT); secret stripped from disk."
        echo "  health check: task daemon:mac:doctor"

  daemon:mac:bootstrap:
    desc: "[Mode 1: your real daemon] One-shot daemon setup: seed creds (Keychain + profile) → build + install the LaunchAgent. Run once, after `task tf:coldstorage:creds-export` in the devcontainer. After this, launchd keeps the daemon running (RunAtLoad/KeepAlive) — you don't re-run it to start it."
    cmds:
      - task: daemon:mac:creds
      - task: daemon:mac:install

  daemon:mac:doctor:
    desc: "Health-check the installed daemon: launchd state, AWS auth via the coldstorage profile (Keychain), and getStatus over the control socket."
    dir: coldstorage
    vars:
      SOCK: "{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock"
      ERRLOG: "{{.HOME}}/Library/Application Support/ColdStorage/coldstored.err.log"
    cmds:
      - 'echo "── launchd ──"'
      - launchctl print "gui/$(id -u)/com.theadpharm.coldstored" 2>/dev/null | grep -iE "state =|pid =|last exit" || echo "not loaded — run task daemon:mac:bootstrap"
      - 'echo "── AWS auth (coldstorage profile → credential_process → Keychain) ──"'
      - aws sts get-caller-identity --profile coldstorage || echo "auth FAILED — re-run task daemon:mac:bootstrap (fixes the profile), then re-check"
      - 'echo "── daemon status (control socket) ──"'
      # An `if`, not an && || && chain: the old one parsed as ((A && B) || C) && D, so the error-log tail
      # ran even when getStatus had answered perfectly — a wall of log lines under a healthy result reads
      # as a failure, and cost real time during the 2026-07-18 hunt. The log is diagnostic ONLY when the
      # socket is missing or the call fails; on success the status line is the whole answer.
      - |
        if [ ! -S "{{.SOCK}}" ]; then
          echo "no control socket at {{.SOCK}} — the daemon isn't listening. Last errors:"
          tail -n 20 "{{.ERRLOG}}" 2>/dev/null || echo "(no error log)"
        elif ! ./.build/release/coldstorectl "{{.SOCK}}" getStatus; then
          echo "socket is there but getStatus FAILED — last errors:"
          tail -n 20 "{{.ERRLOG}}" 2>/dev/null || echo "(no error log)"
        fi

  daemon:mac:uninstall:
    desc: "Stop + remove the coldstored LaunchAgent. Needed before testing Mode 2 (ui:mac:package) — it and Mode 1 share the same socket/data dir; `task daemon:mac:bootstrap` brings Mode 1 back afterward."
    vars:
      PLIST: "{{.HOME}}/Library/LaunchAgents/com.theadpharm.coldstored.plist"
    cmds:
      - launchctl bootout "gui/$(id -u)/com.theadpharm.coldstored" 2>/dev/null || true
      - rm -f "{{.PLIST}}"
      - 'echo "removed {{.PLIST}}"'

  daemon:mac:reset:
    desc: "DESTRUCTIVE — wipe the installed daemon's local state for a clean slate: stop it, delete the journal (the tree SSOT) + status + scratch + logs, restart empty. Comes back with NO files and NO watched folders. Does NOT touch S3 — old blobs in the prod vault are left orphaned (harmless; purge with an admin profile if you care) — nor the app's sign-in / MasterKey escrow. Re-deposits re-upload from scratch (the journal no longer marks anything verified)."
    dir: coldstorage
    vars:
      DATA_DIR: "{{.HOME}}/Library/Application Support/ColdStorage"
      PLIST: "{{.HOME}}/Library/LaunchAgents/com.theadpharm.coldstored.plist"
    cmds:
      # 1. Stop the daemon FIRST — it holds the SQLite handle (+WAL); deleting the journal under a live
      #    daemon would corrupt, not clean. bootout closes the log fds too, so truncating below is safe.
      - launchctl bootout "gui/$(id -u)/com.theadpharm.coldstored" 2>/dev/null || true
      # 2. Delete the journal + its WAL sidecars (the tree/sources/excludes SSOT) and the status cache.
      - rm -f "{{.DATA_DIR}}/coldstore.sqlite" "{{.DATA_DIR}}/coldstore.sqlite-wal" "{{.DATA_DIR}}/coldstore.sqlite-shm" "{{.DATA_DIR}}/status.json"
      # 3. Clear the scratch dir (a killed photo deposit's plaintext), then recreate it empty.
      - rm -rf "{{.DATA_DIR}}/scratch" && mkdir -p "{{.DATA_DIR}}/scratch"
      # 4. Fresh logs (the daemon will append to these on restart).
      - ': > "{{.DATA_DIR}}/coldstored.out.log"; : > "{{.DATA_DIR}}/coldstored.err.log"'
      # 5. Restart — the daemon recreates an empty journal at the next sign-in (RunAtLoad).
      - launchctl bootstrap "gui/$(id -u)" "{{.PLIST}}"
      - 'echo "✓ reset — empty tree, no watched folders, fresh logs. Verify: task daemon:mac:live -- listFiles (expect [])"'

  # ------------------------------------------------------------------ ui (domain: ui/)
  # Electron/React control panel — a THIN client over the daemon's control socket. Layer 1 = Node IPC
  # bridge (`node:net`); layer 2 = electron-vite shell (main/preload/renderer) + event-stream→state.
  # Tooling is Bun; the Electron runtime is its own bundled Node. See ui/DESIGN.md.
  ui:setup:
    desc: "Install UI deps (Bun) + ensure Electron's native binary."
    dir: ui
    cmds:
      - bun install
      - task: ui:_ensure-electron

  ui:_ensure-electron:
    # Bun skips postinstall scripts by default, so Electron's binary download (its postinstall) never
    # runs → `task ui:mac:live` dies with "Electron uninstall". This runs the downloader directly, and is
    # idempotent: the `status` check skips it once the binary is present. A dep of ui:mac:live so launching
    # self-heals. (We also list electron in package.json trustedDependencies for fresh installs.)
    internal: true
    dir: ui
    status:
      - test -f node_modules/electron/path.txt
      - test -d node_modules/electron/dist
    cmds:
      - "[ -d node_modules/electron ] || bun install"
      - node node_modules/electron/install.js

  ui:typecheck:
    desc: "Type-check the UI package (strict; node + web projects)."
    dir: ui
    cmds:
      - bun run typecheck

  ui:test:
    desc: "Run the headless renderer tests (state fold + file-tree model; no Electron/daemon needed)."
    dir: ui
    cmds:
      - bun run test

  ui:mac:live:
    desc: "Run the UI against the INSTALLED launchd daemon (real prod AWS) — dogfood the real thing. Needs task daemon:mac:bootstrap done."
    dir: ui
    deps: [ui:_ensure-electron]
    env:
      # The launchd daemon's socket (daemon:mac:install path).
      COLDSTORE_SOCKET: "{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock"
      COLDSTORE_PHOTO_PICKER: "{{.ROOT_DIR}}/coldstorage/.build/release/coldstore-photo-picker"
    cmds:
      - |
        # Sign-in config sourced from the local creds file; secrets stripped.
        CREDS="{{.ROOT_DIR}}/coldstorage/.local/daemon-creds.env"
        if [ -f "$CREDS" ]; then set -a; . "$CREDS"; set +a; unset DAEMON_AKID DAEMON_SECRET; fi
        bun run dev

  # ====================================================================================================================
  #  app:mac:* — the whole app, end to end, in one command (compositions of daemon:mac:* + ui:mac:*)
  #
  #  These exist because "run the app against staging" was three commands with one silent footgun: the
  #  INSTALLED launchd daemon is a stale binary until you rebuild it, so a new daemon command (e.g.
  #  `restorePlan`) fails as unknown-method and the feature looks broken when it isn't. Every task here
  #  reinstalls the daemon FIRST.
  #
  #  ENV IS ALWAYS EXPLICIT — never a default. Staging = sandbox Paddle (test cards, fake money);
  #  production = LIVE Paddle, where a restore charges a real card. The two are one word apart, so the
  #  production tasks confirm before they run.
  # ====================================================================================================================

  app:mac:_require-api-deployed:
    internal: true
    # THE GATE. The app talks to the DEPLOYED API over HTTPS — it never runs your local account-backend/
    # code. So if your working tree's API differs from what Vercel deployed, you are testing the OLD API
    # while reading the NEW source, and every conclusion you draw is wrong. (That is not hypothetical: it
    # is exactly how an evening went missing on 2026-07-13.)
    #
    # We compare the working tree's account-backend/ against the branch Vercel deploys — NOT "are you on
    # branch X". Branch is a proxy; code parity is the actual question, and it stays true when you're on
    # `main` with an identical API. Catches uncommitted edits, staged edits, unpushed commits, and new
    # untracked files alike, because `git diff <remote>` sees all of them.
    #
    # Daemon + UI are deliberately NOT checked: `app:mac:run:*` rebuilds those from source, so local
    # changes to them ARE what you're running.
    #
    # SCOPE = only what Vercel actually ships. `account-backend/src` + `package.json` (deps) + the lockfile.
    # NOT `scripts/` (local tooling — db:doctor and friends never leave your machine) and not tests. A gate
    # that cries wolf over files that can't possibly affect the deployed API is a gate people learn to
    # skip, which is worse than no gate.
    vars:
      BRANCH: '{{.BRANCH | default "staging"}}'
      API: '{{.API | default "https://api-staging.coldstorage.sh"}}'
      DEPLOYED: "account-backend/src account-backend/package.json account-backend/bun.lock"
    cmds:
      # ── CHECK 2: is the DEPLOYED API's DATABASE migrated? ────────────────────────────────────────
      # Code parity (below) is only half the story. The API can be running your exact code and STILL
      # 500 on every request, because the database IT opens — from ITS OWN DATABASE_URL on Vercel — is
      # not necessarily the one you pushed your schema to. Nothing local can answer that, so we ask the
      # running service: GET /health introspects its own DB against its own Drizzle schema.
      - |
        set -e
        if [ "${SKIP_DEPLOY_CHECK:-0}" = "1" ]; then exit 0; fi

        body="$(curl -sS --max-time 15 "{{.API}}/health" 2>/dev/null || true)"
        case "$body" in
          *'"ok":true'*)
            echo "✓ {{.API}} — its database is migrated to this schema." ;;
          *'"ok":false'*)
            echo "─────────────────────────────────────────────────────────────────────────────"
            echo "✗ THE DEPLOYED API'S DATABASE IS BEHIND ITS CODE — every route will 500."
            echo "─────────────────────────────────────────────────────────────────────────────"
            echo "$body" | sed 's/^/  /'
            echo ""
            echo "  The API reads a DATABASE_URL set on Vercel — NOT your local .env. Point"
            echo "  account-backend/.env at THAT database, then: task backend:db:push"
            echo "  (Override: SKIP_DEPLOY_CHECK=1)"
            echo "─────────────────────────────────────────────────────────────────────────────"
            exit 1 ;;
          "")
            echo "⚠ {{.API}}/health didn't respond — can't verify its database. Is it deployed?" ;;
          *)
            echo "⚠ {{.API}}/health gave an unexpected reply (older deploy without /health?):"
            echo "$body" | head -c 200 | sed 's/^/    /'; echo "" ;;
        esac

      # ── CHECK 1: is the deployed API running YOUR code? ──────────────────────────────────────────
      - |
        set -e
        remote="origin/{{.BRANCH}}"

        if [ "${SKIP_DEPLOY_CHECK:-0}" = "1" ]; then
          echo "⚠ SKIP_DEPLOY_CHECK=1 — not verifying the deployed API matches your tree."
          exit 0
        fi

        git fetch --quiet origin {{.BRANCH}} 2>/dev/null || true
        if ! git rev-parse --verify --quiet "$remote" >/dev/null; then
          echo "⚠ no $remote to compare against — can't verify what the deployed API is running."
          exit 0
        fi

        untracked="$(git ls-files --others --exclude-standard -- {{.DEPLOYED}})"
        diff="$(git diff --name-only "$remote" -- {{.DEPLOYED}})"

        if [ -z "$untracked" ] && [ -z "$diff" ]; then
          echo "✓ the deployed API code matches $remote — you're testing what's actually running."
          exit 0
        fi

        echo "─────────────────────────────────────────────────────────────────────────────"
        echo "✗ YOUR API CHANGES ARE NOT DEPLOYED — this run would test the OLD backend."
        echo "─────────────────────────────────────────────────────────────────────────────"
        echo "  The app calls the DEPLOYED API (Vercel). It never runs your local account-backend/."
        echo "  These differ from $remote:"
        [ -n "$diff" ] && echo "$diff" | sed 's/^/      /'
        [ -n "$untracked" ] && echo "$untracked" | sed 's/^/      + /'
        echo ""
        echo "  Commit + push to {{.BRANCH}} and let Vercel deploy, then re-run."
        echo "  Or iterate against a LOCAL API instead:  task app:mac:run:local"
        echo "  (Override, if you know the diff doesn't matter:  SKIP_DEPLOY_CHECK=1 task <task>)"
        echo "─────────────────────────────────────────────────────────────────────────────"
        exit 1

  app:mac:run:staging-local:
    desc: "[SAFE] Local app + daemon (from source) against the DEPLOYED STAGING API (sandbox Paddle — test cards, no real money). The one for testing paid retrieval, since Paddle's webhooks can only reach a public URL. GATED: refuses if your account-backend/ differs from what origin/staging deployed, because the app would silently test the old API."
    cmds:
      - task: app:mac:_require-api-deployed
        vars: { BRANCH: staging, API: "https://api-staging.coldstorage.sh" }
      # Stale-binary footgun: the launchd daemon keeps running whatever was installed last, so a new daemon
      # command (e.g. `restorePlan`) would fail as unknown-method and the feature would look broken.
      - task: daemon:mac:install
      # The lane goes as a VAR, not `env:` — go-task does not propagate a caller's env into a called task
      # (verified), so an `env:` here would silently fall through to ui:mac:config's default.
      - task: ui:mac:config
        vars:
          ACCOUNT_API: "https://api-staging.coldstorage.sh"
      - task: ui:mac:live

  app:mac:run:local:
    desc: "[SAFE · fastest loop] Everything local: the API runs on your machine (vercel dev, reading account-backend/.env — so YOUR DATABASE_URL is the one in play) and the app points at localhost. Backend edits are live with no deploy. NOTE: Paddle webhooks cannot reach localhost, so the PAID restore path can't complete here — free/allowance restores can. Needs the Vercel CLI (`npm i -g vercel`)."
    cmds:
      - task: daemon:mac:install
      - task: ui:mac:config
        vars:
          ACCOUNT_API: "http://localhost:3000"
      - |
        # Background the API so the UI can run in the foreground; `task dev:stop` kills it.
        cd account-backend
        bun --env-file=.env.vercel --env-file=.env run dev > /tmp/coldstorage-local-api.log 2>&1 &
        echo $! > /tmp/coldstorage-local-api.pid
        printf "starting local API on :3000"
        for _ in $(seq 1 60); do
          curl -sf http://localhost:3000/ >/dev/null 2>&1 && break
          printf "."; sleep 1
        done
        echo ""
        if ! curl -sf http://localhost:3000/ >/dev/null 2>&1; then
          echo "✗ the local API didn't come up. Log: /tmp/coldstorage-local-api.log"
          echo "  (Vercel CLI installed? `npm i -g vercel` + `vercel login` once.)"
          exit 1
        fi
        echo "✓ local API up — it is reading account-backend/.env, so DATABASE_URL there is the DB in play."
        echo "  log: /tmp/coldstorage-local-api.log · stop it later with: task dev:stop"
      - task: ui:mac:live

  app:mac:run:production-local:
    desc: "[⚠️ LIVE MONEY] Local app + daemon against the DEPLOYED PRODUCTION API (live Paddle): a restore or subscribe charges a REAL card. Confirms first. GATED against origin/main."
    interactive: true
    prompt: "This points the app at PRODUCTION — LIVE Paddle. A restore or subscription will charge a REAL card, and a paid restore starts a real Deep Archive thaw you pay AWS for. Continue?"
    cmds:
      - task: app:mac:_require-api-deployed
        vars: { BRANCH: main, API: "https://api.coldstorage.sh" }
      - task: daemon:mac:install
      # Passed as a var for the reason above. If this ever silently became staging, a "production" test would
      # quietly prove nothing — which is precisely the failure the var (not env) exists to prevent.
      - task: ui:mac:config
        vars:
          ACCOUNT_API: "https://api.coldstorage.sh"
      - task: ui:mac:live

  app:mac:package:staging:
    desc: "[Mode 2 · SAFE] Build + launch-ready the PACKAGED ColdStorage.app wired to STAGING (sandbox Paddle). Uninstalls the Mode 1 launchd daemon first — Mode 1 and Mode 2 fight over the same socket/data dir, and the packaged app silently hangs on 'Connecting…' if you skip it. Bring Mode 1 back with `task daemon:mac:bootstrap`. GATED against origin/staging (the bundled app calls the DEPLOYED API)."
    cmds:
      - task: app:mac:_require-api-deployed
        vars: { BRANCH: staging, API: "https://api-staging.coldstorage.sh" }
      # Not optional: the packaged app bundles its OWN daemon, which can't bind a socket Mode 1 still holds.
      - task: daemon:mac:uninstall
      # Bundles a freshly-built daemon from current source, and bakes ENV=staging itself.
      - task: ui:mac:package
      - echo "→ ui/dist/ColdStorage.app (staging-wired). Mode 1 is uninstalled; 'task daemon:mac:bootstrap' restores it."

  app:mac:package:production:
    desc: "[Mode 2 · ⚠️ LIVE MONEY, not published] Build the PRODUCTION-wired ColdStorage.app — signed + notarized, but NOT published to GitHub (that's ui:mac:release). Live Paddle: anything you buy in it is a real charge. Uninstalls the Mode 1 daemon first (socket collision). Needs the Developer ID cert + notary creds. GATED against origin/main."
    interactive: true
    prompt: "This builds a PRODUCTION-wired app — LIVE Paddle. Anything purchased in it charges a REAL card. (It will NOT be published — that's ui:mac:release.) Continue?"
    cmds:
      - task: app:mac:_require-api-deployed
        vars: { BRANCH: main, API: "https://api.coldstorage.sh" }
      - task: daemon:mac:uninstall
      # release:dryrun is the prod-wired local build: bakes ENV=production, signs + notarizes, publishes NOTHING.
      - task: ui:mac:release:dryrun
      - echo "→ ui/dist/ColdStorage.app (PRODUCTION-wired, signed, unpublished). 'task daemon:mac:bootstrap' restores Mode 1."

  ui:build:
    desc: "Build all three Electron processes (main/preload/renderer) to ui/out."
    dir: ui
    cmds:
      - bun run build

  ui:mac:package:
    desc: "[Mode 2: packaged app] Package a distributable ColdStorage.app (+ dmg/zip) via electron-builder. Bundles the release Swift binaries. Unsigned unless a Developer ID + notary creds are set — see ui/PACKAGING.md."
    dir: ui
    deps: [ui:_ensure-electron]
    cmds:
      # Sync node_modules to the lockfile first: electron-builder collects the app's PRODUCTION deps (e.g.
      # electron-updater) from node_modules, so a stale tree (fresh pull, lockfile advanced) fails its
      # collection with "production dependency not found". Idempotent when already in sync.
      - bun install
      # The bundled binaries must exist before electron-builder copies them (electron-builder.yml extraResources).
      - swift build -c release --package-path "{{.ROOT_DIR}}/coldstorage"
      - bun run build # electron-vite → out/{main,preload,renderer}
      # Bake the public config before electron-builder bundles it (Phase 6d). ENV=staging: a local
      # `ui:mac:package` is Ben's DOGFOOD build (sandbox Paddle + the staging key-blob DB, safe to test money);
      # the customer build comes from `ui:mac:release` (ENV=production). Never publish a staging build.
      - task: ui:config:bake
        vars:
          ENV: staging
      - bunx electron-builder --mac # node CLI (not --bun); reads electron-builder.yml → ui/dist/ColdStorage.app + dmg/zip

  ui:_require-apple-creds:
    # Shared preflight for ui:mac:release + ui:mac:release:dryrun. `${VAR:?msg}` errors + exits non-zero when the
    # var is unset/empty (dotenv-loaded .env counts). The signing identity itself is auto-discovered from
    # the login keychain ('Developer ID Application'), or set via CSC_LINK/CSC_KEY_PASSWORD — not checked here.
    internal: true
    cmds:
      - |
        : "${APPLE_ID:?missing — your Apple ID email; set it in the env or the gitignored .env (see ui/PACKAGING.md)}"
        : "${APPLE_TEAM_ID:?missing — your 10-char Apple Developer Team ID (see ui/PACKAGING.md)}"
        : "${APPLE_APP_SPECIFIC_PASSWORD:?missing — an app-specific password from appleid.apple.com (see ui/PACKAGING.md)}"

  ui:mac:release:
    desc: "[Mode 2: packaged app] Build + SIGN + NOTARIZE ColdStorage.app, then PUBLISH the .dmg/.zip + `latest-mac.yml` update feed to a GitHub Release (PROD.md Phase 6 — the auto-updater reads this feed). Bump `ui/package.json` version first. REFUSES unless you're on a clean, pushed `main`: GitHub tags main's latest REMOTE commit, so a dirty / wrong-branch / unpushed tree would ship a binary no tag reproduces (bypass with RELEASE_FORCE=1). For a signed build WITHOUT publishing, use ui:mac:release:dryrun. Needs the Developer ID cert + notary creds + GH_TOKEN (env or .env). See ui/PACKAGING.md."
    dir: ui
    deps: [ui:_ensure-electron, ui:_require-apple-creds]
    vars:
      RELEASE_BRANCH: main
    cmds:
      # Provenance guard: when the draft release is published, GitHub tags {{.RELEASE_BRANCH}}'s latest REMOTE
      # commit — NOT your working tree. So the only state where the `v<version>` tag reproduces the built
      # binary is a clean {{.RELEASE_BRANCH}} in sync with origin. RELEASE_FORCE=1 bypasses (you accept the risk).
      - |
        if [ -z "${RELEASE_FORCE:-}" ]; then
          branch=$(git -C "{{.ROOT_DIR}}" rev-parse --abbrev-ref HEAD)
          if [ "$branch" != "{{.RELEASE_BRANCH}}" ]; then
            echo "Refusing to release from '$branch': GitHub attaches the tag to '{{.RELEASE_BRANCH}}', so the binary wouldn't match the tag. Switch to {{.RELEASE_BRANCH}} (or set RELEASE_FORCE=1)."
            exit 1
          fi
          if [ -n "$(git -C "{{.ROOT_DIR}}" status --porcelain)" ]; then
            echo "Refusing to release with a dirty tree — uncommitted changes go into the binary but not the tag. Commit them first (or set RELEASE_FORCE=1):"
            git -C "{{.ROOT_DIR}}" status --short
            exit 1
          fi
          git -C "{{.ROOT_DIR}}" fetch --quiet origin "{{.RELEASE_BRANCH}}" || { echo "Couldn't fetch origin/{{.RELEASE_BRANCH}} — are you online? (A release needs to reach GitHub.)"; exit 1; }
          if [ "$(git -C "{{.ROOT_DIR}}" rev-parse HEAD)" != "$(git -C "{{.ROOT_DIR}}" rev-parse "origin/{{.RELEASE_BRANCH}}")" ]; then
            echo "Refusing to release — local {{.RELEASE_BRANCH}} isn't in sync with origin/{{.RELEASE_BRANCH}}. Push (or pull) so the tag matches the built source (or set RELEASE_FORCE=1)."
            exit 1
          fi
        fi
      - |
        : "${GH_TOKEN:?missing — a GitHub token with 'repo' scope to publish the release; see ui/PACKAGING.md}"
      # Bump guard (dummy-proofing): refuse unless ui/package.json's version is strictly AHEAD of the latest
      # PUBLISHED GitHub release, so re-running ui:mac:release WITHOUT bumping can't republish / no-op the same
      # version. `releases/latest` ignores drafts + prereleases. Fails fast — before the minutes-long
      # build/sign/notarize. If GitHub can't be read (no gh / none published yet / offline), it warns +
      # continues rather than block (the common footgun — "forgot to bump" — needs a successful read anyway).
      - |
        pkg="$(node -p "require('./package.json').version")"
        latest=""
        command -v gh >/dev/null 2>&1 && latest="$(gh api repos/benhonda/coldstorage/releases/latest --jq '.tag_name' 2>/dev/null | sed 's/^v//')"
        if [ -z "$latest" ]; then
          echo "⚠ couldn't read the latest published release from GitHub (no gh / none published / offline) — skipping the bump guard for $pkg."
        elif node -e 'const p=process.argv[1].split(".").map(Number),l=process.argv[2].split(".").map(Number);process.exit((p[0]!==l[0]?p[0]>l[0]:p[1]!==l[1]?p[1]>l[1]:p[2]>l[2])?0:1)' "$pkg" "$latest"; then
          echo "version $pkg is ahead of the latest release ($latest) — ok to release."
        else
          echo "✋ Refusing to release: ui/package.json version ($pkg) is NOT ahead of the latest published release ($latest)."
          echo "   Bump \"version\" in ui/package.json to a higher patch/minor/major, commit + push, then re-run 'task ui:mac:release'."
          exit 1
        fi
      - echo "Building a signed + notarized ColdStorage and publishing to GitHub Releases (benhonda/coldstorage)…"
      # Sync node_modules to the lockfile — electron-builder collects the app's production deps (electron-updater)
      # from node_modules, so a stale tree fails with "production dependency not found". Idempotent when in sync.
      - bun install
      - swift build -c release --package-path "{{.ROOT_DIR}}/coldstorage"
      - bun run build # electron-vite → out/{main,preload,renderer}
      # Pre-create the draft release so electron-builder finds ONE release to upload to. A draft has no git
      # tag, so electron-builder's find-by-tag misses it and its CONCURRENT asset uploads each create a fresh
      # draft (electron-builder #6676) — you get duplicate v<version> drafts with the assets split across them.
      # Idempotent: skipped if the draft already exists. Needs gh (authed via GH_TOKEN, required above); if gh
      # is absent we warn + continue (electron-builder still publishes, just with the duplicate-draft risk).
      - |
        ver="$(node -p "require('./package.json').version")"   # bare semver, e.g. 0.1.0
        tag="v${ver}"                                          # git tag, e.g. v0.1.0 (electron-builder's default)
        if ! command -v gh >/dev/null 2>&1; then
          echo "⚠ gh not found — skipping draft pre-create; electron-builder may create duplicate $tag drafts (#6676). Install gh to prevent it."
        elif gh release view "$tag" --repo benhonda/coldstorage >/dev/null 2>&1; then
          echo "release $tag already exists — electron-builder will upload to it"
        else
          # tag = v<semver>, title = bare <semver> — matches how electron-builder names them (no mixed v0.1.0 / 0.1.0).
          gh release create "$tag" --repo benhonda/coldstorage --draft --title "$ver" \
            --notes "Draft — assets uploaded by electron-builder; review, then Publish." && echo "pre-created draft $tag"
        fi
      # Bake the public config before electron-builder bundles it (Phase 6d). ENV=production: this is the
      # CUSTOMER build published to the public feed, so it must point at the prod account-backend lane
      # (api.coldstorage.sh) — which must be stood up first (PROD.md Phase 4), else sign-in/checkout 404s.
      - task: ui:config:bake
        vars:
          ENV: production
      # --publish always → upload the .dmg/.zip + latest-mac.yml. -c.mac.notarize=true → notarize THIS build
      # (the yml default is false so plain `ui:mac:package` stays cert-free).
      - bunx electron-builder --mac --publish always -c.mac.notarize=true

  ui:mac:release:dryrun:
    desc: "[Mode 2: packaged app] Full signed-artifact rehearsal of ui:mac:release: build + SIGN + NOTARIZE ColdStorage.app locally but DON'T publish (no GitHub release, no git tag, no GH_TOKEN — hence no provenance guard, run it dirty/any-branch freely). Output: ui/dist/. Needs the Developer ID cert + notary creds (APPLE_ID/APPLE_TEAM_ID/APPLE_APP_SPECIFIC_PASSWORD). See ui/PACKAGING.md."
    dir: ui
    deps: [ui:_ensure-electron, ui:_require-apple-creds]
    cmds:
      - echo "Building a signed + notarized ColdStorage (no publish)…"
      # Sync node_modules to the lockfile — electron-builder collects the app's production deps (electron-updater)
      # from node_modules, so a stale tree fails with "production dependency not found". Idempotent when in sync.
      - bun install
      - swift build -c release --package-path "{{.ROOT_DIR}}/coldstorage"
      - bun run build # electron-vite → out/{main,preload,renderer}
      # Bake the public config before electron-builder bundles it (Phase 6d). ENV=production: dryrun is a
      # faithful signing/notarization rehearsal of the CUSTOMER build, so it bakes the same prod lane.
      - task: ui:config:bake
        vars:
          ENV: production
      # --publish never → build + sign + notarize only; nothing is uploaded or tagged.
      - bunx electron-builder --mac --publish never -c.mac.notarize=true

  ui:mac:notarize:doctor:
    desc: "Diagnose a notarization 401 from ui:mac:release: probe the Apple notary creds (APPLE_ID/APPLE_TEAM_ID/APPLE_APP_SPECIFIC_PASSWORD — the SAME env/.env values ui:mac:release uses) directly against Apple via `notarytool history`. Prints a non-secret shape check, then a clean auth probe (passes with valid creds, 401 with bad ones) so you can fix creds WITHOUT rebuilding the app each time."
    dir: ui
    deps: [ui:_require-apple-creds]
    cmds:
      - |
        pw="${APPLE_APP_SPECIFIC_PASSWORD}"
        echo "APPLE_ID       = ${APPLE_ID}"
        echo "APPLE_TEAM_ID  = ${APPLE_TEAM_ID}   (expect 10 chars — got ${#APPLE_TEAM_ID})"
        echo "APP_PASSWORD   = ${#pw} chars   (expect 19, i.e. xxxx-xxxx-xxxx-xxxx; a different length usually means a stray quote/space/newline in .env)"
        echo
        echo "Probing Apple's notary service (notarytool history)…"
        if xcrun notarytool history --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$pw" >/dev/null 2>/tmp/notary-err; then
          echo "✓ Apple ACCEPTED the creds — notary auth is fine; re-run 'task ui:mac:release'."
        else
          echo "✗ Apple REJECTED the creds (the same 401 the release hit). It's one of:"
          echo "  • APPLE_APP_SPECIFIC_PASSWORD must be an APP-SPECIFIC password (NOT your normal Apple ID password) —"
          echo "    make one at appleid.apple.com ▸ Sign-In & Security ▸ App-Specific Passwords; paste it UNQUOTED into .env."
          echo "  • APPLE_ID must be the exact email that generated that app-specific password."
          echo "  • APPLE_TEAM_ID must be that account's 10-char Team ID (developer.apple.com ▸ Membership)."
          echo "  --- notarytool said: ---"; cat /tmp/notary-err
          exit 1
        fi

  ui:mac:sign:doctor:
    desc: "Diagnose a 'not signed with a valid Developer ID certificate' notarization rejection: list your keychain's code-signing identities and check for a 'Developer ID Application' cert — the ONLY kind valid for notarized distribution. An 'Apple Development'/'Mac Developer' cert (what daemon:mac:install uses for local runs) is NOT valid for notarization; Apple rejects it."
    dir: ui
    cmds:
      - |
        echo "Code-signing identities in your keychain:"
        security find-identity -v -p codesigning || true
        echo
        if security find-identity -v -p codesigning | grep -q "Developer ID Application"; then
          echo "✓ A 'Developer ID Application' cert IS present — electron-builder should auto-pick it. If notarization"
          echo "  still rejects, an 'Apple Development' cert may be getting chosen instead — pin the right one by setting"
          echo "  mac.identity in electron-builder.yml (or CSC_NAME in .env) to the exact 'Developer ID Application: …' name above."
        else
          echo "✗ NO 'Developer ID Application' cert found — THIS is the notarization rejection."
          echo "  Notarized distribution REQUIRES a 'Developer ID Application' certificate. The 'Apple Development' cert"
          echo "  (what daemon:mac:install uses for local runs) is NOT valid for notarization."
          echo "  Create one: Xcode ▸ Settings ▸ Accounts ▸ (your team) ▸ Manage Certificates ▸ + ▸ 'Developer ID Application',"
          echo "  or developer.apple.com ▸ Certificates ▸ + ▸ 'Developer ID Application' (needs Account Holder/Admin role)."
          echo "  Install it into the login keychain, then re-run 'task ui:mac:release'."
          exit 1
        fi

  ui:mac:package:verify:
    desc: "Sanity-check the packaged app: bundled Swift binaries present + their code-signing status (the bits that can't be checked off-Mac)."
    dir: ui
    cmds:
      - |
        app=$(find dist -maxdepth 3 -name 'ColdStorage.app' -type d 2>/dev/null | head -1)
        [ -n "$app" ] || { echo "no ColdStorage.app under dist/ — run 'task ui:mac:package' first"; exit 1; }
        echo "app: $app"
        echo "── bundled binaries (expect coldstored + helpers) ──"
        ls -la "$app/Contents/Resources/bin" || { echo "MISSING bin/ — extraResources didn't copy"; exit 1; }
        echo "── app signature ──";        codesign -dv --verbosity=2 "$app" 2>&1 | grep -Ei 'Identifier|Authority|Runtime' || echo "(unsigned)"
        echo "── coldstored signature ──"; codesign -dv --verbosity=2 "$app/Contents/Resources/bin/coldstored" 2>&1 | grep -Ei 'Identifier|Authority|Runtime' || echo "(unsigned — nested binary not signed)"

  ui:mac:package:sign-adhoc:
    desc: "[Mode 2: packaged app] Ad-hoc sign the built ColdStorage.app so it (+ its bundled arm64 helpers) will LAUNCH locally on Apple Silicon — a smoke-test stopgap. Ad-hoc is per-build (no stable TCC grant); real Developer/Apple-Development signing lands with the packaged app. NOT for distribution. Run `task daemon:mac:uninstall` first — this collides with the Mode 1 launchd daemon's socket/data dir."
    dir: ui
    cmds:
      - |
        app=$(find dist -maxdepth 3 -name 'ColdStorage.app' -type d 2>/dev/null | head -1)
        [ -n "$app" ] || { echo "no ColdStorage.app under dist/ — run 'task ui:mac:package' first"; exit 1; }
        # Sign the nested helpers FIRST (inside-out), then the app — codesign requires nested code be sealed
        # before the outer bundle. `-s -` = ad-hoc (no cert needed, just enough for AMFI to let arm64 run).
        for b in "$app/Contents/Resources/bin/coldstored" \
                 "$app/Contents/Resources/bin/coldstore-photo-picker"; do
          codesign --force --sign - "$b" && echo "ad-hoc signed: $(basename "$b")"
        done
        codesign --force --sign - "$app"
        echo "ad-hoc signed $app — launching…"
        open "$app"

  ui:mac:config:
    desc: "Write the packaged app's config (~/Library/Application Support/ColdStorage/config.json: bucket/region/profile + the Cognito identity pool id/provider + the sign-in domain/client id, when the handoff has them) from the infra-outputs handoff, so a Finder-launched ColdStorage.app — which inherits no shell env — can upload and sign users in. NO secret is written here; creds resolve via the profile's credential_process → Keychain (run `task daemon:mac:creds` once). Mirrors the env daemon:mac:install bakes into the launchd plist."
    dir: coldstorage
    vars:
      DATA_DIR: "{{.HOME}}/Library/Application Support/ColdStorage"
      # Which account-backend lane the app talks to. A task VAR (not just the env var below) because
      # go-task does NOT propagate a caller's `env:` into a called task — only `vars:` — so `app:mac:run:*`
      # must pass the lane this way or it would silently fall through to the staging default. That is a
      # dangerous default to fall through to in the PRODUCTION direction, so it's passed explicitly.
      ACCOUNT_API: '{{.ACCOUNT_API | default ""}}'
    cmds:
      - mkdir -p "{{.DATA_DIR}}"
      - |
        # Same SSOT + defaults as daemon:mac:install: bucket/region/profile come from the handoff file written
        # by `task tf:coldstorage:creds-export` in the devcontainer. Env vars still override.
        CREDS="{{.ROOT_DIR}}/coldstorage/.local/daemon-creds.env"
        [ -f "$CREDS" ] && { set -a; . "$CREDS"; set +a; }
        bucket="${COLDSTORE_BUCKET:-coldstorage}"
        region="${AWS_REGION:-us-east-1}"
        profile="${COLDSTORE_AWS_PROFILE:-coldstorage}"
        # Cognito (multi-user prod) is opt-in — empty when the handoff predates Phase 2c, which the app's
        # daemon supervisor (main/daemon.ts) treats the same as "not configured" (dogfood mode, unchanged).
        cognito_pool_id="${COLDSTORE_COGNITO_IDENTITY_POOL_ID:-}"
        cognito_provider="${COLDSTORE_COGNITO_USER_POOL_PROVIDER:-}"
        # OAuth sign-in (Phase 5): the managed-login host + public client id the app's sign-in flow uses.
        # Empty when the handoff predates Phase 5 → the app hides sign-in entirely (dogfood mode).
        cognito_domain="${COLDSTORE_COGNITO_DOMAIN:-}"
        cognito_client_id="${COLDSTORE_COGNITO_CLIENT_ID:-}"
        # Account-backend base URL (Phase 5b, key-blob + entitlement). Defaults to the staging lane, which
        # accepts production Cognito tokens; the production lane overrides via COLDSTORE_ACCOUNT_API.
        # Precedence: the ACCOUNT_API task var (how app:mac:run:* passes the lane — see the var's note) →
        # COLDSTORE_ACCOUNT_API from the shell/handoff → the staging default. Staging is the safe fallback:
        # sandbox Paddle, so a misconfigured run can't charge a real card.
        account_api='{{.ACCOUNT_API}}'
        account_api="${account_api:-${COLDSTORE_ACCOUNT_API:-https://api-staging.coldstorage.sh}}"
        echo "→ account backend: $account_api"
        printf '{\n  "bucket": "%s",\n  "region": "%s",\n  "awsProfile": "%s",\n  "cognitoIdentityPoolId": "%s",\n  "cognitoUserPoolProvider": "%s",\n  "cognitoDomain": "%s",\n  "cognitoClientId": "%s",\n  "accountApiBaseUrl": "%s"\n}\n' \
          "$bucket" "$region" "$profile" "$cognito_pool_id" "$cognito_provider" "$cognito_domain" "$cognito_client_id" "$account_api" > "{{.DATA_DIR}}/config.json"
        echo "wrote {{.DATA_DIR}}/config.json  (bucket=$bucket region=$region profile=$profile cognito=${cognito_pool_id:+configured}${cognito_pool_id:-not configured} sign-in=${cognito_domain:+configured}${cognito_domain:-not configured})"
        echo "creds: ensure 'task daemon:mac:creds' wired the '$profile' profile + Keychain (one-time). Verify: task ui:mac:package:doctor"

  ui:config:bake:
    desc: "Bake the PUBLIC app config into ui/build/app-config.json (bundled at Contents/Resources/app-config.json) so a config-less download self-configures — sign-in is the only setup (PROD.md Phase 6d). ENV=production|staging picks the account-backend lane (prod → api.coldstorage.sh, staging → api-staging.coldstorage.sh) — the ONLY thing that differs between a customer build and a dogfood build (Cognito + vault bucket are shared). REQUIRED + explicit: there is no silent default, so a customer build can never accidentally ship staging-wired. Sourced from the SAME infra-outputs handoff as ui:mac:config but PUBLIC-ONLY: no awsProfile (customers get creds via Cognito STS). Run automatically by ui:mac:release (production) / ui:mac:package (staging)."
    dir: coldstorage
    requires:
      vars: [ENV]
    vars:
      OUT: "{{.ROOT_DIR}}/ui/build/app-config.json"
    cmds:
      - 'case "{{.ENV}}" in production|staging) ;; *) echo "ENV must be production|staging (got: {{.ENV}})"; exit 1 ;; esac'
      - mkdir -p "{{.ROOT_DIR}}/ui/build"
      - |
        # The account-backend lane is the whole staging-vs-prod distinction for the app (Cognito + the S3
        # vault bucket are SHARED across lanes — see cognito.tf; PROD.md Phase 4). The key-blob lives in
        # whichever lane's DB, so a customer build MUST bake prod: onboarding against staging would strand the
        # user's encrypted master key in the test DB. COLDSTORE_ACCOUNT_API still overrides if explicitly set.
        case "{{.ENV}}" in
          production) default_api="https://api.coldstorage.sh" ;;
          staging)    default_api="https://api-staging.coldstorage.sh" ;;
        esac
        account_api="${COLDSTORE_ACCOUNT_API:-$default_api}"

        # Same SSOT as ui:mac:config (the handoff written by `task tf:coldstorage:creds-export`), but PUBLIC
        # values ONLY — this file ships inside the .dmg, so awsProfile (the dogfood credential_process path)
        # is deliberately omitted; a customer signs in and gets scoped STS creds. Cognito + bucket are
        # lane-independent, so they come from the handoff unchanged for both ENVs.
        CREDS="{{.ROOT_DIR}}/coldstorage/.local/daemon-creds.env"
        if [ ! -f "$CREDS" ]; then
          printf '{\n  "accountApiBaseUrl": "%s"\n}\n' "$account_api" > "{{.OUT}}"
          echo "⚠ no handoff ($CREDS) — baked only accountApiBaseUrl=$account_api (no bucket/Cognito). This build can't upload/sign-in (dogfood: relies on 'task ui:mac:config'). Run 'task tf:coldstorage:creds-export' in the devcontainer for a real build."
          exit 0
        fi
        set -a; . "$CREDS"; set +a
        bucket="${COLDSTORE_BUCKET:-coldstorage}"
        region="${AWS_REGION:-us-east-1}"
        cognito_pool_id="${COLDSTORE_COGNITO_IDENTITY_POOL_ID:-}"
        cognito_provider="${COLDSTORE_COGNITO_USER_POOL_PROVIDER:-}"
        cognito_domain="${COLDSTORE_COGNITO_DOMAIN:-}"
        cognito_client_id="${COLDSTORE_COGNITO_CLIENT_ID:-}"
        printf '{\n  "bucket": "%s",\n  "region": "%s",\n  "cognitoIdentityPoolId": "%s",\n  "cognitoUserPoolProvider": "%s",\n  "cognitoDomain": "%s",\n  "cognitoClientId": "%s",\n  "accountApiBaseUrl": "%s"\n}\n' \
          "$bucket" "$region" "$cognito_pool_id" "$cognito_provider" "$cognito_domain" "$cognito_client_id" "$account_api" > "{{.OUT}}"
        echo "baked {{.OUT}}  (ENV={{.ENV}} bucket=$bucket region=$region cognito=${cognito_pool_id:+configured}${cognito_pool_id:-NOT configured} sign-in=${cognito_domain:+configured}${cognito_domain:-NOT configured} account-api=$account_api)"

  ui:mac:bootstrap:
    desc: "One-shot setup so the packaged ColdStorage.app can upload: seed creds (Keychain + `coldstorage` profile) → write the app's config.json. Run once after `task tf:coldstorage:creds-export` (devcontainer). The .app analogue of daemon:mac:bootstrap."
    cmds:
      - task: daemon:mac:creds
      - task: ui:mac:config

  ui:mac:auth:doctor:
    desc: "Diagnose a hanging/broken sign-in (Phase 5a). Run in a SECOND terminal while the browser is stuck. Checks: who owns loopback port 53682 (an Electron process = healthy pending sign-in; Code/Docker/OrbStack = a devcontainer port-forward stole it), whether the app's one-shot listener answers, and whether the sign-in config resolves."
    cmds:
      - |
        echo "── who owns 127.0.0.1:53682 ──"
        lsof -nP -iTCP:53682 || echo "nothing listening — no pending sign-in (the listener only runs between clicking sign-in and the callback), or the app isn't running"
        echo "── listener probe (a 404 is HEALTHY — deliberately NOT /auth/callback, which would consume the one-shot listener) ──"
        curl -s -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" --max-time 5 "http://localhost:53682/ping" || echo "no response — refused (no listener) or TIMED OUT (something accepted but never answered ⇒ a port-forward proxy, see above)"
        echo "── sign-in config (what the dev lanes source from the handoff) ──"
        CREDS="{{.ROOT_DIR}}/coldstorage/.local/daemon-creds.env"
        if [ -f "$CREDS" ]; then
          . "$CREDS"
          echo "domain: ${COLDSTORE_COGNITO_DOMAIN:-MISSING}"
          echo "client: ${COLDSTORE_COGNITO_CLIENT_ID:-MISSING}"
        else
          echo "handoff MISSING — run 'task tf:coldstorage:creds-export' in the devcontainer first"
        fi
        echo "── Cognito reachability from this Mac ──"
        if [ -n "${COLDSTORE_COGNITO_DOMAIN:-}" ]; then
          curl -s -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" --max-time 10 "https://${COLDSTORE_COGNITO_DOMAIN}/oauth2/authorize"
        fi

  ui:mac:package:doctor:
    desc: "[Mode 2: packaged app] Diagnose a packaged app stuck on 'Connecting…': did the bundled coldstored spawn, bind its socket, and what did it log? If the process path it finds is coldstorage/.build/release/coldstored (not Contents/Resources/bin/coldstored), that's actually the Mode 1 launchd daemon still holding the shared socket — run `task daemon:mac:uninstall` and re-launch the app."
    cmds:
      - |
        echo "── data dir (auto-discovered) ──"
        dir=$(ls -d "$HOME/Library/Application Support/"*[Cc]old[Ss]torage* 2>/dev/null | head -1)
        if [ -z "$dir" ]; then
          echo "NONE — the app never created a data dir ⇒ the daemon never started."
          echo "Most likely the bundle is stale. Rebuild: task ui:mac:package && task ui:mac:package:sign-adhoc"; exit 0
        fi
        echo "$dir"
        echo "── coldstored process ──"; pgrep -fl coldstored || echo "NOT running (never spawned, or crash-looping)"
        echo "── control socket ──"; ls -l "$dir/coldstored.sock" 2>/dev/null || echo "no socket (daemon never bound it)"
        # Upload prerequisites (the "connects but can't upload" blocker): config.json + the AWS profile it names.
        echo "── upload config (config.json) ──"
        if [ -f "$dir/config.json" ]; then
          cat "$dir/config.json"
          profile=$(sed -n 's/.*"awsProfile"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$dir/config.json")
          profile="${profile:-coldstorage}"
          echo "── AWS auth (profile '$profile' → credential_process → Keychain) ──"
          aws sts get-caller-identity --profile "$profile" 2>&1 | grep -Ei 'Arn|error|could not|Unable' \
            || echo "auth FAILED — run 'task daemon:mac:creds' (wires the profile + Keychain)"
        else
          echo "MISSING — a Finder-launched app can't upload without it. Run 'task ui:mac:config' (or 'task ui:mac:bootstrap')."
        fi
        echo "── coldstored.err.log (last 25) ──"; tail -n 25 "$dir/coldstored.err.log" 2>/dev/null || echo "(no err log — coldstored likely never spawned)"

  dev:stop:
    desc: "Stop the local API left running by `task app:mac:run:local`."
    cmds:
      # The local account-backend (vercel dev) that app:mac:run:local backgrounds.
      - |
        if [ -f /tmp/coldstorage-local-api.pid ]; then
          kill "$(cat /tmp/coldstorage-local-api.pid)" 2>/dev/null || true
          rm -f /tmp/coldstorage-local-api.pid
          echo "stopped the local API"
        fi

  ui:prove:
    desc: "Prove the layer-1 IPC bridge against the INSTALLED daemon (task daemon:mac:bootstrap first)."
    dir: ui
    env:
      COLDSTORE_SOCKET: "{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock"
    cmds:
      - bun run prove

  # ------------------------------------------------------------------ account-backend (domain: account-backend/)
  # Hono on Vercel + Neon/Drizzle — Cognito↔Paddle↔zero-knowledge-key-blob API (PROD.md Phase 4).
  # Two env files, both gitignored, both in account-backend/: .env.vercel is the pulled
  # baseline (`task pull:account-backend` — staging's real values); .env is optional LOCAL
  # OVERRIDES on top (e.g. point DATABASE_URL at your own local Postgres instead of staging's)
  # — loaded second via --env-file so it wins. Neither is auto-loaded by bun/drizzle-kit/vercel
  # dev on their own (only plain .env is), hence the explicit --env-file flags below.
  backend:setup:
    desc: "Install account-backend deps (Bun)."
    dir: account-backend
    cmds:
      - bun install

  backend:typecheck:
    desc: "Type-check account-backend (strict tsc)."
    dir: account-backend
    cmds:
      - bun run typecheck

  backend:test:
    desc: "Run account-backend's headless tests (pure logic only — no live DB/Cognito/Paddle needed)."
    dir: account-backend
    cmds:
      - bun run test

  backend:dev:
    desc: "Run the API locally via the Vercel CLI (needs `vercel login` once + `task pull:account-backend`, or fill account-backend/.env by hand from .env.example)."
    dir: account-backend
    cmds:
      - bun --env-file=.env.vercel --env-file=.env run dev

  backend:paddle:seed:
    desc: "Seed the Paddle catalog (3 products × 4 term prices). PLANS by default; pass `-- --env sandbox|production` (required), `--apply` to write, `--archive-extras` to retire off-SSOT entities. Reads PADDLE_API_KEY (live) / PADDLE_API_KEY_FOR_SANDBOX (sandbox)."
    dir: account-backend
    cmds:
      # Reads the per-env key (+ optional PADDLE_TAX_CATEGORY) from the environment you export — the
      # task loads no secrets of its own. `{{.CLI_ARGS}}` forwards `-- --env … --apply`.
      - bun run scripts/seed-paddle-catalog.ts {{.CLI_ARGS}}

  backend:paddle:client-token:
    desc: "Mint (or reuse) the Paddle client-side token for Paddle.js on /checkout. Idempotent per environment. Pass `-- --env sandbox|production`; reads PADDLE_API_KEY / PADDLE_API_KEY_FOR_SANDBOX. Prints the non-secret token for TF."
    dir: account-backend
    cmds:
      - bun run scripts/create-paddle-client-token.ts {{.CLI_ARGS}}

  backend:db:push:
    desc: "Push the Drizzle schema to Neon (drizzle-kit push) — NO migration files. Target is DATABASE_URL from account-backend/.env (it's loaded last, so it overrides .env.vercel — verified). Prints the host AND the lane (STAGING vs not, derived from the pulled .env.vercel staging baseline). ⚠ Staging + production are SEPARATE Neon DBs — a push lands on ONE lane, and the other needs its own push before code expecting the new schema deploys there. Verify after with backend:db:doctor."
    dir: account-backend
    interactive: true
    prompt: "Before pushing schema changes, double-check DATABASE_URL — is it correct?"
    cmds:
      # .env is loaded LAST and wins for DATABASE_URL; .env.vercel still supplies everything else
      # (PADDLE_*, COGNITO_*, AWS_*). You choose the target in .env — nothing here second-guesses it.
      # db-target says which host AND which lane, out loud, because "which database did that actually
      # hit" is the fact that went unnoticed for an evening.
      - bun --env-file=.env.vercel --env-file=.env run scripts/db-target.ts
      - bun --env-file=.env.vercel --env-file=.env run db:push
      # The vice-versa reminder. Staging and production are SEPARATE Neon DBs (there's no
      # restore-one-from-the-other in this project) — a schema change that ships to both lanes needs
      # a push per lane, and forgetting the second one surfaces later as a bare http 500 from the
      # deployed API. Printed AFTER a successful push, the moment you're about to walk away.
      - |
        echo ""
        echo "⚠️  That push changed ONE lane only (the lane line above says which). Staging and"
        echo "   production are separate Neon DBs — the other lane keeps its OLD schema until you"
        echo "   repoint DATABASE_URL in account-backend/.env and run this again. Before deploying"
        echo "   code that needs the new schema to the other lane, push its DB first."
        echo "   Deployed-lane check: task backend:api:health ENV=staging  |  ENV=production"


  backend:db:doctor:
    desc: "Does the DB match the code? Compares the live Neon schema against what Drizzle expects and names any missing table/column. The first thing to run when a route returns a bare `http 500` — that's usually Postgres rejecting a column the code is sure exists. READ-ONLY (fixing = backend:db:push)."
    dir: account-backend
    cmds:
      # DATABASE_URL only — deliberately does NOT need the app's full env (which is what you're missing
      # when you're debugging a half-configured environment in the first place).
      - bun --env-file=.env.vercel --env-file=.env run scripts/db-doctor.ts

  backend:api:health:
    desc: "Ask a DEPLOYED backend whether the database IT reads is migrated to the schema ITS code expects — the one question you cannot answer from your laptop (the API's DATABASE_URL lives on Vercel, not in your .env). ENV=staging|production (default staging)."
    vars:
      ENV: '{{.ENV | default "staging"}}'
    cmds:
      - |
        case "{{.ENV}}" in
          production) api="https://api.coldstorage.sh" ;;
          staging)    api="https://api-staging.coldstorage.sh" ;;
          *) echo "ENV must be staging|production (got: {{.ENV}})"; exit 1 ;;
        esac
        echo "→ $api/health"
        curl -sS --max-time 15 "$api/health" | (command -v jq >/dev/null && jq . || cat)
        echo ""

  backend:retrieval:probe:
    desc: "Is the paid-retrieval API actually deployed? Probes the staging backend's /retrieval routes (unauthenticated). 401 = deployed and guarding correctly; 404 = the deploy hasn't picked up the new routes yet. Read-only, no auth, no money."
    vars:
      API: '{{.API | default "https://api-staging.coldstorage.sh"}}'
    cmds:
      - |
        echo "probing {{.API}} …"
        for route in /retrieval/quote /retrieval/jobs/probe; do
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "{{.API}}$route" -H 'content-type: application/json' -d '{}')
          case "$code" in
            401) echo "  ✓ $route → 401 (deployed; correctly refuses an unauthenticated caller)" ;;
            404) echo "  ✗ $route → 404 (NOT deployed — push/redeploy the backend first)" ;;
            *)   echo "  ? $route → $code (unexpected — check the deploy logs)" ;;
          esac
        done

  backend:retrieval:jobs:
    desc: "Watch the retrieval hard gate: recent restore jobs (what we charged) next to what S3 actually did (frozen / thawing / ready). The ONE view that proves the gate works — a PAID job whose blobs are still frozen means the webhook never thawed them. Read-only. Pass `-- --limit 30`."
    dir: account-backend
    cmds:
      # Same env pattern as backend:db:push (DATABASE_URL from .env.vercel); AWS comes from your pharmer SSO.
      - bun --env-file=.env.vercel --env-file=.env run scripts/inspect-retrieval.ts {{.CLI_ARGS}}

  # ====================================================================================================================
  #  Vercel (link + env pull — domain namespaced by app, like tf:<component>:*)
  # ====================================================================================================================
  # Pulls into account-backend/.env.vercel (see the account-backend section above for how
  # that + .env get loaded). Bare `vercel env pull` defaults to the "development" target —
  # which, by construction (vercel-env-vars.tf), resolves ONLY to staging's values: once
  # staging exists, production's manual secrets are sensitive=true and don't target
  # "development" at all, so there's no accidental-production-pull footgun, no --environment
  # flag needed.
  link:account-backend:
    desc: Link account-backend to its Vercel project
    dir: account-backend
    interactive: true
    cmds:
      - bunx vercel link

  pull:account-backend:
    desc: Pull account-backend's env vars from Vercel into .env.vercel (staging's values — production is sensitive, not pullable)
    dir: account-backend
    interactive: true
    cmds:
      - bunx vercel env pull .env.vercel

  # ------------------------------------------------------------------ site (RR7 web app, dir: site)
  generate:site:
    desc: Run the site's code generators (routes + env; guarded — safe no-op if a script is absent)
    dir: site
    dotenv: &site-dotenv        # anchor once, per app — paths resolve relative to dir: site
      - .env
      - .env.vercel
    cmds:
      - |
        f=app/lib/router/generouted-generate-routes.ts
        [ -f "$f" ] && bun run "$f" || echo "⚠️  skip generate-routes ($f not found)"
      - |
        f=app/lib/env/_core/env-map.generate.ts
        [ -f "$f" ] && bun run "$f" || echo "⚠️  skip generate-env ($f not found)"

  typecheck:site:
    desc: Type check the site (generates first so types reflect fresh codegen)
    dir: site
    dotenv: *site-dotenv
    deps: [generate:site]
    cmds:
      - bun run typecheck

  start:site:
    aliases: [dev:site]
    desc: Start the site (marketing) dev server
    dir: site
    dotenv: *site-dotenv
    interactive: true
    cmds:
      - bunx --bun react-router dev

  link:site:
    desc: Link the site to its Vercel project
    dir: site
    dotenv: *site-dotenv
    interactive: true
    cmds:
      - bunx vercel link

  pull:site:
    desc: Pull the site's env vars from Vercel into .env.vercel
    dir: site
    dotenv: *site-dotenv
    interactive: true
    cmds:
      - bunx vercel env pull .env.vercel

  start:
    aliases: [dev]
    desc: Start an app's dev server (interactive app picker)
    interactive: true
    silent: true
    cmds:
      - |
        echo "Start which app?"
        select app in site quit; do
          case "$app" in
            site) exec task start:site ;;
            quit) break ;;
            *) echo "invalid" ;;
          esac
        done

  link:
    desc: Link an app to its Vercel project (interactive app picker)
    interactive: true
    silent: true
    cmds:
      - |
        echo "Link which app?"
        select app in account-backend site quit; do
          case "$app" in
            account-backend) exec task link:account-backend ;;
            site) exec task link:site ;;
            quit) break ;;
            *) echo "invalid" ;;
          esac
        done

  pull:
    desc: Pull an app's Vercel env vars into .env (interactive app picker)
    interactive: true
    silent: true
    cmds:
      - |
        echo "Pull env for which app?"
        select app in account-backend site all quit; do
          case "$app" in
            account-backend) exec task pull:account-backend ;;
            site) exec task pull:site ;;
            all) exec task pull:account-backend pull:site ;;
            quit) break ;;
            *) echo "invalid" ;;
          esac
        done

  # ------------------------------------------------------------------ infra — tf:coldstorage:* (domain: infra/coldstorage)
  # Storage buckets (S3 Glacier Deep Archive + R2) + lifecycle rules. State in
  # terraform-state-sensitive (pharmer / ca-central-1); ENV-scoped; shared planned first.
  # NOTE: infra/coldstorage scaffolding is the next build chunk — surface wired per convention.
  tf:coldstorage:_validate-env:
    internal: true
    requires:
      vars: [ENV]
    cmds:
      - 'case "{{.ENV}}" in production|staging) ;; *) echo "ENV must be production|staging"; exit 1 ;; esac'

  # The pre-sign-up Lambda (modules/stack/lambda.tf) is packaged from a BUILT artifact — typecheck +
  # unit tests + bundle here, so a plan/apply can never ship a stale or broken dist. Idempotent + fast.
  tf:coldstorage:lambda:build:
    desc: Build the Cognito pre-sign-up Lambda (typecheck + tests + bundle → dist/index.mjs)
    dir: infra/coldstorage/modules/stack/lambda/pre-signup
    cmds:
      - bun install
      - bun run typecheck
      - bun test
      - bun run build

  tf:coldstorage:plan:
    desc: Terragrunt plan (ENV=production|staging) — plans shared first
    requires:
      vars: [ENV]
    deps: [check-aws-identity, "tf:coldstorage:lambda:build"]
    dir: infra/coldstorage/live/{{.ENV}}
    cmds:
      - task: tf:coldstorage:_validate-env
      - task: tf:coldstorage:plan:shared
      - terragrunt plan {{.CLI_ARGS}}
  tf:coldstorage:plan:shared:
    deps: [check-aws-identity]
    dir: infra/coldstorage/live/shared
    cmds:
      - terragrunt plan {{.CLI_ARGS}}

  tf:coldstorage:apply:
    desc: Terragrunt apply (ENV=…) — applies shared then env. Never run without a reviewed plan.
    interactive: true
    prompt: "Apply ColdStorage infra to {{.ENV}}?"
    requires:
      vars: [ENV]
    deps: [check-aws-identity, "tf:coldstorage:lambda:build"]
    dir: infra/coldstorage/live/{{.ENV}}
    cmds:
      - task: tf:coldstorage:_validate-env
      - task: tf:coldstorage:apply:shared
      - terragrunt apply {{.CLI_ARGS}}
  tf:coldstorage:apply:shared:
    internal: true
    interactive: true
    dir: infra/coldstorage/live/shared
    cmds:
      - terragrunt apply {{.CLI_ARGS}}

  tf:coldstorage:init:
    requires:
      vars: [ENV]
    deps: [check-aws-identity]
    dir: infra/coldstorage/live/{{.ENV}}
    cmds:
      - task: tf:coldstorage:_validate-env
      - terragrunt init {{.CLI_ARGS}}

  tf:coldstorage:google-creds:
    desc: Store the Google OAuth client id + secret in SSM (one-time; cognito.tf reads them once enable_google_idp=true)
    interactive: true
    deps: [check-aws-identity]
    cmds:
      - |
        # NOT named GID/UID — those are READONLY built-ins in Task's shell (mvdan/sh); `read GID`
        # silently keeps the unix group id (=1000 here), which is exactly what got stored on the
        # first run of this task (2026-07-02). The shape checks below catch any repeat of that class.
        read -r -p "Google OAuth client id: " G_CLIENT_ID
        read -r -s -p "Google OAuth client secret (hidden): " G_CLIENT_SECRET; echo
        case "$G_CLIENT_ID" in
          *.apps.googleusercontent.com) ;;
          *) echo "✗ that doesn't look like a Google client id (want *.apps.googleusercontent.com, got ${#G_CLIENT_ID} chars) — nothing stored"; exit 1 ;;
        esac
        [ "${#G_CLIENT_SECRET}" -ge 10 ] || { echo "✗ secret looks too short (${#G_CLIENT_SECRET} chars) — nothing stored"; exit 1; }
        aws ssm put-parameter --profile {{.AWS_PROFILE}} --region ca-central-1 \
          --name /coldstorage/google-oauth-client-id --type String --overwrite --value "$G_CLIENT_ID" > /dev/null
        aws ssm put-parameter --profile {{.AWS_PROFILE}} --region ca-central-1 \
          --name /coldstorage/google-oauth-client-secret --type SecureString --overwrite --value "$G_CLIENT_SECRET" > /dev/null
        echo "✓ stored: id ${G_CLIENT_ID%%-*}-…(${#G_CLIENT_ID} chars), secret …(${#G_CLIENT_SECRET} chars)"
        echo "  If enable_google_idp is already true, re-plan+apply so Cognito picks up the new values: task tf:plan"

  tf:coldstorage:creds-export:
    desc: "[devcontainer] Export the daemon's creds from TF state → gitignored handoff file the daemon:mac:* tasks read (so the Mac needs no terragrunt). Run after apply; the file rides the bind mount to the Mac."
    deps: [check-aws-identity]
    dir: infra/coldstorage/live/production
    vars:
      DIR: "{{.ROOT_DIR}}/coldstorage/.local"
      OUT: "{{.ROOT_DIR}}/coldstorage/.local/daemon-creds.env"
    cmds:
      - mkdir -p "{{.DIR}}" && chmod 700 "{{.DIR}}"
      - |
        # Lock perms before writing the secret: create empty, chmod 600, then `>` (preserves the mode).
        touch "{{.OUT}}" && chmod 600 "{{.OUT}}"
        {
          echo "COLDSTORE_BUCKET=$(terragrunt output -raw bucket_name)"
          echo "AWS_REGION=$(terragrunt output -raw aws_region)"
          echo "DAEMON_AKID=$(terragrunt output -raw daemon_access_key_id)"
          echo "DAEMON_SECRET=$(terragrunt output -raw daemon_secret_access_key)"
          # Cognito (PROD.md Phase 2, multi-user) — NOT secrets (public client config), so they ride the
          # handoff untouched by daemon:mac:creds' secret-stripping step. Provider name is Cognito's documented
          # `Logins` key shape (cognito-idp.<region>.amazonaws.com/<userPoolId>) — same one cognito.tf notes
          # next to `aws_cognito_user_pool.main.endpoint`.
          echo "COLDSTORE_COGNITO_IDENTITY_POOL_ID=$(terragrunt output -raw cognito_identity_pool_id)"
          echo "COLDSTORE_COGNITO_USER_POOL_PROVIDER=cognito-idp.$(terragrunt output -raw aws_region).amazonaws.com/$(terragrunt output -raw cognito_user_pool_id)"
          # OAuth sign-in config (PROD.md Phase 5) — also public client config. Domain is empty until a
          # federated IdP is enabled in TF; the app treats empty as "sign-in not configured" (dogfood mode).
          echo "COLDSTORE_COGNITO_DOMAIN=$(terragrunt output -raw cognito_domain)"
          echo "COLDSTORE_COGNITO_CLIENT_ID=$(terragrunt output -raw cognito_user_pool_client_id)"
        } > "{{.OUT}}"
        echo "✓ wrote {{.OUT}} (0600, gitignored)."
        echo "  now on the Mac:  task daemon:mac:creds && task daemon:mac:install"

  # ------------------------------------------------------------------ infra — tf:account-backend:* (domain: infra/account-backend)
  # The Vercel project's OIDC role + TF-managed env vars (Cognito ids sourced from
  # infra/coldstorage via a cross-component `dependency` block — SSOT, no manual copy-paste).
  # ENV=production|staging — staging exists so Paddle SANDBOX webhooks have a stable deployed
  # URL + a database isolated from real subscription data (both share ONE Vercel project;
  # staging is a branch-tracked custom environment within it, see modules/stack). Secrets
  # (DATABASE_URL, Paddle keys) are declared here but their VALUES are set once in the Vercel
  # dashboard after first apply (terraform.md's manual_secrets pattern) — never in this repo.
  tf:account-backend:_validate-env:
    internal: true
    requires:
      vars: [ENV]
    cmds:
      - 'case "{{.ENV}}" in production|staging) ;; *) echo "ENV must be production|staging"; exit 1 ;; esac'

  tf:account-backend:plan:
    desc: Terragrunt plan (ENV=production|staging) — plans shared first
    requires:
      vars: [ENV]
    deps: [check-aws-identity]
    dir: infra/account-backend/live/{{.ENV}}
    cmds:
      - task: tf:account-backend:_validate-env
      - task: tf:account-backend:plan:shared
      - terragrunt plan {{.CLI_ARGS}}
  tf:account-backend:plan:shared:
    deps: [check-aws-identity]
    dir: infra/account-backend/live/shared
    cmds:
      - terragrunt plan {{.CLI_ARGS}}

  tf:account-backend:apply:
    desc: Terragrunt apply (ENV=production|staging) — applies shared then env. Never run without a reviewed plan.
    interactive: true
    prompt: "Apply account-backend infra to {{.ENV}}?"
    requires:
      vars: [ENV]
    deps: [check-aws-identity]
    dir: infra/account-backend/live/{{.ENV}}
    cmds:
      - task: tf:account-backend:_validate-env
      - task: tf:account-backend:apply:shared
      - terragrunt apply {{.CLI_ARGS}}
  tf:account-backend:apply:shared:
    internal: true
    interactive: true
    dir: infra/account-backend/live/shared
    cmds:
      - terragrunt apply {{.CLI_ARGS}}

  tf:account-backend:init:
    requires:
      vars: [ENV]
    deps: [check-aws-identity]
    dir: infra/account-backend/live/{{.ENV}}
    cmds:
      - task: tf:account-backend:_validate-env
      - terragrunt init {{.CLI_ARGS}}

  # ------------------------------------------------------------------ infra — tf:site:* (domain: infra/site)
  # The marketing site's Vercel project — dormant OIDC role + TF-managed PUBLIC_PADDLE_* env
  # vars. Simplest of the three components: no Cognito, no DB, no manual secrets. ENV=production|
  # staging (staging = the Paddle SANDBOX /checkout target, a branch-tracked custom environment
  # within the one Vercel project). DNS deferred until the domain is added (infra/site/README.md).
  # ⚠️ Placeholders until the Vercel project is created manually (`task link:site`) — see README.
  tf:site:_validate-env:
    internal: true
    requires:
      vars: [ENV]
    cmds:
      - 'case "{{.ENV}}" in production|staging) ;; *) echo "ENV must be production|staging"; exit 1 ;; esac'

  tf:site:plan:
    desc: Terragrunt plan (ENV=production|staging) — plans shared first
    requires:
      vars: [ENV]
    deps: [check-aws-identity]
    dir: infra/site/live/{{.ENV}}
    cmds:
      - task: tf:site:_validate-env
      - task: tf:site:plan:shared
      - terragrunt plan {{.CLI_ARGS}}
  tf:site:plan:shared:
    deps: [check-aws-identity]
    dir: infra/site/live/shared
    cmds:
      - terragrunt plan {{.CLI_ARGS}}

  tf:site:apply:
    desc: Terragrunt apply (ENV=production|staging) — applies shared then env. Never run without a reviewed plan.
    interactive: true
    prompt: "Apply site infra to {{.ENV}}?"
    requires:
      vars: [ENV]
    deps: [check-aws-identity]
    dir: infra/site/live/{{.ENV}}
    cmds:
      - task: tf:site:_validate-env
      - task: tf:site:apply:shared
      - terragrunt apply {{.CLI_ARGS}}
  tf:site:apply:shared:
    internal: true
    interactive: true
    dir: infra/site/live/shared
    cmds:
      - terragrunt apply {{.CLI_ARGS}}

  tf:site:init:
    requires:
      vars: [ENV]
    deps: [check-aws-identity]
    dir: infra/site/live/{{.ENV}}
    cmds:
      - task: tf:site:_validate-env
      - terragrunt init {{.CLI_ARGS}}

  # ------------------------------------------------------------------ infra — pick a target (one cli step, like the app `dev` picker)
  # `task tf:plan` / `tf:apply` / `tf:init` with no args — prompts for which component + env,
  # then dispatches to the per-component tf:<service>:* tasks above (those stay the SSOT for
  # each component's env list/dependencies/validation — coldstorage is production-only,
  # account-backend also has staging). Still fine to call `task tf:coldstorage:plan
  # ENV=production` etc. directly (e.g. scripted use, or to pass extra terragrunt flags after
  # `--`) — this is a friendlier front door, not a replacement.
  tf:plan:
    desc: "Pick an infra component + env to plan"
    interactive: true
    cmds:
      - |
        echo
        echo "Plan which infra?"
        echo "  1) coldstorage      — production"
        echo "  2) account-backend  — production"
        echo "  3) account-backend  — staging"
        echo "  4) site             — production"
        echo "  5) site             — staging"
        echo "  q) quit"
        echo
        printf "Choice [1]: "
        read -r choice
        choice="${choice:-1}"
        case "$choice" in
          1|coldstorage)                        task tf:coldstorage:plan ENV=production ;;
          2|account-backend|ab)                 task tf:account-backend:plan ENV=production ;;
          3|account-backend:staging|ab:staging)  task tf:account-backend:plan ENV=staging ;;
          4|site)                                task tf:site:plan ENV=production ;;
          5|site:staging)                        task tf:site:plan ENV=staging ;;
          q|Q|quit) ;;
          *) echo "Invalid choice: $choice"; exit 1 ;;
        esac

  tf:apply:
    desc: "Pick an infra component + env to apply. Never run without a reviewed plan (each target still confirms separately before applying)."
    interactive: true
    cmds:
      - |
        echo
        echo "Apply which infra?"
        echo "  1) coldstorage      — production"
        echo "  2) account-backend  — production"
        echo "  3) account-backend  — staging"
        echo "  4) site             — production"
        echo "  5) site             — staging"
        echo "  q) quit"
        echo
        printf "Choice [1]: "
        read -r choice
        choice="${choice:-1}"
        case "$choice" in
          1|coldstorage)                        task tf:coldstorage:apply ENV=production ;;
          2|account-backend|ab)                 task tf:account-backend:apply ENV=production ;;
          3|account-backend:staging|ab:staging)  task tf:account-backend:apply ENV=staging ;;
          4|site)                                task tf:site:apply ENV=production ;;
          5|site:staging)                        task tf:site:apply ENV=staging ;;
          q|Q|quit) ;;
          *) echo "Invalid choice: $choice"; exit 1 ;;
        esac

  tf:init:
    desc: "Pick an infra component + env to init"
    interactive: true
    cmds:
      - |
        echo
        echo "Init which infra?"
        echo "  1) coldstorage      — production"
        echo "  2) account-backend  — production"
        echo "  3) account-backend  — staging"
        echo "  4) site             — production"
        echo "  5) site             — staging"
        echo "  q) quit"
        echo
        printf "Choice [1]: "
        read -r choice
        choice="${choice:-1}"
        case "$choice" in
          1|coldstorage)                        task tf:coldstorage:init ENV=production ;;
          2|account-backend|ab)                 task tf:account-backend:init ENV=production ;;
          3|account-backend:staging|ab:staging)  task tf:account-backend:init ENV=staging ;;
          4|site)                                task tf:site:init ENV=production ;;
          5|site:staging)                        task tf:site:init ENV=staging ;;
          q|Q|quit) ;;
          *) echo "Invalid choice: $choice"; exit 1 ;;
        esac

  tf:fmt:
    desc: terraform fmt across infra/
    cmds:
      - terraform fmt -recursive infra/

  # ------------------------------------------------------------------ Security — leak guard (core)
  # Local secret scan over git HISTORY — the public-exposure surface for this public repo.
  # Reads only committed content, so gitignored state/tfvars/.terragrunt-cache are excluded
  # automatically (no false positives off the real secret sitting in local state).
  # The at-PUSH net is GitHub push protection (server-side, free on public repos) — this is the
  # before-push local check. Prefers a host `gitleaks`; else runs the pinned container (no install).
  scan:
    desc: "Scan git history for leaked secrets (run before pushing infra/ or anything sensitive)"
    silent: true
    cmds:
      - >-
        if command -v gitleaks >/dev/null 2>&1; then
        gitleaks git . --no-banner --redact;
        else
        docker run --rm -v "{{.ROOT_DIR}}:/repo" {{.GITLEAKS_IMAGE}} git /repo --no-banner --redact;
        fi && echo "✓ gitleaks: no secrets found in git history"

  hooks:install:
    desc: "Point git at the tracked .githooks/ dir → enables the pre-commit leak guard. Idempotent."
    silent: true
    cmds:
      - git config core.hooksPath .githooks
      - echo "✓ core.hooksPath → .githooks (pre-commit gitleaks scan active; bypass with 'git commit --no-verify')"

  # ------------------------------------------------------------------ One-offs (temp) — quarantined + dated
  # A throwaway is STILL a task (so .env/AWS load the same). Convention:
  #   1. script → scripts/tmp/<slug>.ts   (scripts/tmp/ is gitignored — never committed)
  #   2. add a dated `tmp-<slug>` block below with a DELETE-AFTER-RUN banner
  #   3. once run: delete the block + script, then `task tmp-sweep` to confirm nothing lingers
  tmp-sweep:
    desc: List lingering one-offs (tmp-* tasks + scripts/tmp/ files) so they can be removed
    aliases: [tmp:sweep]
    silent: true
    cmds:
      - |
        echo "── tmp-* task blocks still in Taskfile.yml ──"
        grep -nE '^  tmp-[a-z0-9-]+:' Taskfile.yml | grep -v 'tmp-sweep:' || echo "  (none — clean)"
        echo "── files in scripts/tmp/ ──"
        ls -1 scripts/tmp/ 2>/dev/null | grep -v '^\.gitkeep$' || echo "  (none — clean)"

  # ---- one-off task blocks go below; DELETE each (block + script) once it has run ----
  # tmp-backfill-foo:        # added 2026-06-19 — DELETE AFTER RUN
  #   desc: '[ONE-OFF 2026-06-19] backfill foo, then remove this task + its script'
  #   aliases: [tmp:backfill-foo]
  #   deps: [check-aws-identity]      # only if it touches AWS
  #   cmds:
  #     - bun run scripts/tmp/backfill-foo.ts {{.CLI_ARGS}}
