version: "3"

# https://taskfile.dev/usage/#output-syntax
output: prefixed

# ColdStorage command surface — ONE assembled SSOT file (no go-task `includes:`).
# CORE cross-cutting tasks + per-domain blocks namespaced by component:
#   daemon:*          → the Swift core / container dev loop (domain: coldstorage/)
#   tf:coldstorage:*  → infra (domain: infra/coldstorage) — Terragrunt, ENV-scoped, shared first
vars:
  AWS_PROFILE: "pharmer"
  # Pinned for reproducibility — bump deliberately. Used by `task scan` (leak guard).
  GITLEAKS_IMAGE: "ghcr.io/gitleaks/gitleaks:v8.30.1"

dotenv:
  - .env

tasks:
  default:
    cmds:
      - task --list-all

  # ------------------------------------------------------------------ AWS identity (core)
  login:
    desc: Log in to AWS SSO
    requires:
      vars: [AWS_PROFILE]
    cmds:
      - aws sso login --profile {{.AWS_PROFILE}}

  check-aws-identity:
    desc: Fail early if the AWS profile isn't logged in
    requires:
      vars: [AWS_PROFILE]
    silent: true
    cmds:
      - |
        if ! aws sts get-caller-identity --profile {{.AWS_PROFILE}}; then
          echo "\nYour '{{.AWS_PROFILE}}' AWS profile is not logged in. Run 'task login'."
          exit 1
        fi

  # ------------------------------------------------------------------ daemon (domain: coldstorage/)
  # Native — no Docker. Swift toolchain (swiftly) + a standalone MinIO binary.
  # `task daemon:setup` installs both if missing; the devcontainer post-create does it on rebuild.
  daemon:setup:
    desc: Install the Swift toolchain (Linux) + OS-correct MinIO/mc binaries if missing (idempotent)
    cmds:
      - bash .devcontainer/install-swift.sh
      - task: _minio-binaries

  _minio-binaries:
    # Download the minio + mc binaries for THIS OS/arch (macOS or Linux) if missing. Idempotent via
    # status. A dep of daemon:minio, so the local-S3 loop never needs a manual brew/curl step.
    internal: true
    status:
      - command -v minio
      - command -v mc
    cmds:
      - |
        os=$(uname -s | tr '[:upper:]' '[:lower:]')          # darwin | linux
        case "$(uname -m)" in arm64|aarch64) arch=arm64 ;; *) arch=amd64 ;; esac
        echo "installing minio + mc for ${os}-${arch}"
        sudo curl -fsSL "https://dl.min.io/server/minio/release/${os}-${arch}/minio" -o /usr/local/bin/minio
        sudo curl -fsSL "https://dl.min.io/client/mc/release/${os}-${arch}/mc"       -o /usr/local/bin/mc
        sudo chmod +x /usr/local/bin/minio /usr/local/bin/mc

  daemon:minio:
    desc: Start a local MinIO (background) + create the coldstorage bucket
    dir: coldstorage
    deps: [_minio-binaries]
    cmds:
      - 'pgrep -x minio >/dev/null || { mkdir -p .minio-data && MINIO_ROOT_USER=minioadmin MINIO_ROOT_PASSWORD=minioadmin nohup minio server .minio-data --address :9000 --console-address :9001 > .minio.log 2>&1 & }'
      - sleep 2
      - mc alias set local http://localhost:9000 minioadmin minioadmin
      - mc mb local/coldstorage 2>/dev/null || true
  daemon:minio:stop:
    desc: Stop the local MinIO
    cmds: ['pkill -x minio || true']

  daemon:unlock:
    desc: "Clear a stale SwiftPM build lock (the 0%-CPU 'hung build' footgun) — only if no build/test is live."
    dir: coldstorage
    cmds:
      - |
        if pgrep -x swift-build >/dev/null 2>&1 || pgrep -x swift-test >/dev/null 2>&1; then
          echo "swift build/test is running — leaving .build/.lock alone"
        elif [ -f .build/.lock ]; then
          rm -f .build/.lock && echo "removed stale .build/.lock"
        fi

  daemon:build:dev:
    desc: "Build the Swift core — DEBUG, for the MinIO/test dev loop (any OS). First run fetches deps (a few minutes). For the prod release build, see daemon:install."
    dir: coldstorage
    deps: [daemon:unlock]   # clear a stale lock left by a previously-killed build
    cmds: [swift build]
  daemon:test:
    desc: Run the portable Core tests (swift-testing — no XCTest/CFRunLoop hang)
    dir: coldstorage
    deps: [daemon:unlock]
    cmds: [swift test]

  daemon:testdata:
    desc: Generate sample files to archive (coldstorage/testdata)
    dir: coldstorage
    cmds:
      - mkdir -p testdata
      - dd if=/dev/zero    of=testdata/big.bin     bs=1048576 count=400
      - dd if=/dev/urandom of=testdata/small-1.bin bs=1048576 count=10
      - dd if=/dev/urandom of=testdata/small-2.bin bs=1048576 count=20

  daemon:archive:
    desc: "Archive coldstorage/testdata to MinIO (Ctrl-C mid-run, re-run → resumes). DIR= overrides."
    dir: coldstorage
    env:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      COLDSTORE_PART_DELAY_MS: "800"   # slows parts so kill/resume is visible; set 0 for full speed
    cmds:
      - swift run coldstore-cli {{.DIR | default "testdata"}} coldstorage http://localhost:9000

  daemon:restore:
    desc: "Restore one archived file from MinIO: FILE=<fileId> [OUT=/tmp/restored.bin] [TIER=standard]. On real AWS the first run thaws (exit 75) — re-run to download."
    dir: coldstorage
    env:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    cmds:
      - swift run coldstore-restore {{.FILE}} {{.OUT | default "/tmp/restored.bin"}} coldstorage http://localhost:9000 --tier {{.TIER | default "standard"}}

  daemon:run:
    desc: "Run coldstored (loop + control socket) against MinIO. Drive it with `task daemon:ctl`."
    dir: coldstorage
    env: &daemon_run_env
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      COLDSTORE_ENDPOINT: http://localhost:9000
      COLDSTORE_SOURCES: testdata          # one-time seed → journal registry (SSOT thereafter)
      COLDSTORE_SOCKET: coldstored.sock
      COLDSTORE_INTERVAL: '{{.INTERVAL | default "30"}}'   # overridable (fsevents-test bumps it to 600)
    cmds:
      - swift run coldstored

  daemon:fsevents-test:
    desc: "[macOS] Runtime-test the FSEvents FolderWatcher: runs coldstored vs MinIO with a 600s poll interval (so a prompt re-scan can ONLY be FSEvents, never the poll). Drop a file into coldstorage/testdata in Finder → expect a 'FolderWatcher: FSEvents fired' line + a runStarted→fileArchived→runFinished within ~1-2s. Watch events in another terminal with `task daemon:ctl -- watch`."
    dir: coldstorage
    deps: [daemon:minio, daemon:unlock]   # unlock: clear a stale .build/.lock so the build can't wedge at 0% CPU
    vars:
      INTERVAL: "600"   # huge on purpose: a re-scan within seconds of a drop is FSEvents, not the poll
    env: *daemon_run_env
    cmds:
      - mkdir -p testdata   # FSEvents needs the watched path to exist before the stream starts
      - swift run coldstored

  daemon:run:bg:
    desc: "Start coldstored in the background (logs → coldstorage/.coldstored.log), wait for its socket. Stop: task dev:stop."
    dir: coldstorage
    env: *daemon_run_env                   # same MinIO config as daemon:run (YAML anchor — SSOT)
    cmds:
      - 'pgrep -f "coldstored$" >/dev/null || nohup swift run coldstored > .coldstored.log 2>&1 &'
      - |
        echo "waiting for the control socket (first run builds, ~1-2 min)…"
        for _ in $(seq 1 180); do [ -S coldstored.sock ] && { echo "daemon up"; exit 0; }; sleep 1; done
        echo "timed out — check coldstorage/.coldstored.log" >&2; exit 1

  daemon:ctl:
    desc: 'Send a control command, e.g. `task daemon:ctl -- getStatus` or `-- addSource path=/abs/dir`.'
    dir: coldstorage
    cmds:
      - swift run coldstorectl coldstored.sock {{.CLI_ARGS | default "getStatus"}}

  daemon:restore-ipc:
    desc: "Restore a file *over the running daemon's socket*: FILE=<fileId> [OUT=/tmp/restored.bin] [TIER=standard]. Idempotent — on real AWS re-run until state=restored (thaw takes hours)."
    dir: coldstorage
    cmds:
      - swift run coldstorectl coldstored.sock restore file={{.FILE}} out={{.OUT | default "/tmp/restored.bin"}} tier={{.TIER | default "standard"}}

  daemon:deposit-ipc:
    desc: "Deposit (ad-hoc drop-to-upload) over the running daemon's socket: SRC=/abs/path [DEST=folder] [CONFLICTS='{\"dest/name\":\"keepBoth\"}']. Archives the path(s) once, NO watched source — the same command the UI's drag-drop issues. CONFLICTS is the JSON Keep Both / Replace / Skip map (see daemon:preview-deposit-ipc). Fire-and-forget; check `daemon:ctl -- listFiles`."
    dir: coldstorage
    cmds:
      - swift run coldstorectl coldstored.sock deposit src={{.SRC}} dest={{.DEST | default ""}} {{if .CONFLICTS}}'conflicts={{.CONFLICTS}}'{{end}}

  daemon:logs:
    desc: "[macOS] Tail the installed daemon's stdout+stderr logs (live). Shows PhotoKitResolver auth/resolve diagnostics, deposit errors, etc."
    dir: coldstorage
    vars:
      DATA_DIR: '{{.HOME}}/Library/Application Support/ColdStorage'
    cmds:
      - tail -n 40 -f "{{.DATA_DIR}}/coldstored.out.log" "{{.DATA_DIR}}/coldstored.err.log"

  daemon:logs:clear:
    desc: "[macOS] Truncate the installed daemon's logs in place — a clean slate before reproducing an issue, WITHOUT reinstalling. (daemon:install also resets them.) The daemon keeps writing to the same files."
    dir: coldstorage
    vars:
      DATA_DIR: '{{.HOME}}/Library/Application Support/ColdStorage'
    cmds:
      - ': > "{{.DATA_DIR}}/coldstored.out.log"; : > "{{.DATA_DIR}}/coldstored.err.log"'
      - 'echo "cleared daemon logs"'

  daemon:reset-photos-tcc:
    desc: "[macOS] Reset the daemon's Photos permission so the next depositPhotos re-prompts from scratch (use if you granted Limited instead of Full, or to re-test the grant). Derives the identifier from the signed binary, so it always matches the installed daemon."
    dir: coldstorage
    cmds:
      - |
        # The TCC grant keys to the binary's code-signing Identifier (pinned to com.theadpharm.coldstored in
        # daemon:install) — read it straight from the binary so this can't drift. Also reset the old default
        # "coldstored" identifier, in case a pre-pinning grant is lingering. A "No such bundle identifier"
        # error just means there's no grant to clear (already reset / never granted) — not a failure.
        id=$(codesign -dv .build/release/coldstored 2>&1 | sed -n 's/^Identifier=//p')
        for client in "$id" coldstored; do
          [ -n "$client" ] || continue
          tccutil reset Photos "$client" 2>&1 | sed "s/^/[$client] /" || true
        done
        echo "done — the next photo deposit re-prompts; choose ALL Photos (Full), not Limited"

  daemon:photo-picker:
    desc: "[macOS] Run the native Photos picker helper standalone (no daemon, no UI) — opens the system picker and prints the selection as JSON {id, name} objects. Sanity-checks option B before wiring it through the UI."
    dir: coldstorage
    cmds:
      - swift run coldstore-photo-picker

  daemon:deposit-photos-ipc:
    desc: "Explicit photo deposit over the running daemon's socket: IDS='id1\\nid2' (newline-joined Photos localIdentifiers) [DEST=folder] [CONFLICTS='{\"dest/name\":\"keepBoth\"}']. Archives ONLY those picked photos (never the whole library) — the same command the UI's photo picker issues. CONFLICTS is the JSON collision-resolution map. macOS only (PhotoKit); off-Mac the daemon emits an error event. Check `daemon:ctl -- listFiles`."
    dir: coldstorage
    cmds:
      - swift run coldstorectl coldstored.sock depositPhotos assetIds={{.IDS}} dest={{.DEST | default ""}} {{if .CONFLICTS}}'conflicts={{.CONFLICTS}}'{{end}}

  daemon:preview-deposit-ipc:
    desc: "Dry-run a deposit's placement over the running daemon's socket (no upload): SRC=/abs/path OR IDS='id1\\nid2', plus [DEST=folder]. Prints each target's vault relativePath + whether it already EXISTS (a collision the UI prompts on). The same `previewDeposit` the UI runs before showing Keep Both / Replace / Skip."
    dir: coldstorage
    cmds:
      - swift run coldstorectl coldstored.sock previewDeposit dest={{.DEST | default ""}} {{if .SRC}}src={{.SRC}}{{end}} {{if .IDS}}assetIds={{.IDS}}{{end}}

  daemon:move-ipc:
    desc: "Reorganize over the running daemon's socket — move OR rename: FROM=<vault/path> TO=<new/vault/path>. A cheap journal relativePath edit (no S3, no thaw); the same command the UI's move/rename issues. Check `daemon:ctl -- listFiles`."
    dir: coldstorage
    cmds:
      - swift run coldstorectl coldstored.sock movePath from={{.FROM}} to={{.TO}}

  daemon:delete-ipc:
    desc: "Delete (tombstone) over the running daemon's socket: PATH=<vault/path> (file or folder). Drops from listFiles; bytes aren't reclaimed (deferred repack/GC). Check `daemon:ctl -- listFiles`."
    dir: coldstorage
    cmds:
      - swift run coldstorectl coldstored.sock deletePath path={{.PATH}}

  daemon:exclude-ipc:
    desc: "Manage scan exclude patterns over the running daemon's socket: ADD=<glob> or REMOVE=<glob> (omit both to just list). gitignore-style — bare names match at any depth, globs use */?. The next scan/deposit skips matches. Quote globs so the shell doesn't expand them, e.g. ADD='*.log'."
    dir: coldstorage
    cmds:
      - '{{if .ADD}}swift run coldstorectl coldstored.sock addExclude pattern={{.ADD}}{{end}}'
      - '{{if .REMOVE}}swift run coldstorectl coldstored.sock removeExclude pattern={{.REMOVE}}{{end}}'
      - swift run coldstorectl coldstored.sock listExcludes

  daemon:live:
    desc: '[macOS] Drive the INSTALLED launchd daemon (real prod AWS / Deep Archive), e.g. `task daemon:live -- getStatus` · `-- addSource path=/abs/dir` · `-- triggerNow` · `-- watch`. (daemon:ctl targets the dev/MinIO daemon instead.) Uses the release binary built by daemon:install.'
    dir: coldstorage
    vars:
      SOCK: '{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock'
    cmds:
      - test -S "{{.SOCK}}" || { echo "no installed daemon socket at {{.SOCK}} — run task daemon:bootstrap first"; exit 1; }
      - ./.build/release/coldstorectl "{{.SOCK}}" {{.CLI_ARGS | default "getStatus"}}

  daemon:verify-aws:
    desc: "[macOS] HEAD a single LIVE vault blob directly in S3 (bypasses the daemon) to confirm StorageClass=DEEP_ARCHIVE + see the Restore (thaw) status. BLOB=<blobId> (the hash from listFiles). Uses head-object, so it stays within the daemon's least-priv GetObject grant (no ListBucket). Also the way to poll a thaw: re-run until Restore shows ongoing-request=\"false\"."
    dir: coldstorage
    vars:
      CREDS: '{{.ROOT_DIR}}/coldstorage/.local/daemon-creds.env'
    cmds:
      - |
        [ -f "{{.CREDS}}" ] && { set -a; . "{{.CREDS}}"; set +a; }
        bucket="${COLDSTORE_BUCKET:?missing COLDSTORE_BUCKET — run tf:coldstorage:creds-export in the devcontainer}"
        region="${AWS_REGION:-ca-central-1}"
        blob="{{.BLOB}}"; : "${blob:?pass BLOB=<blobId> (the hash from task daemon:live -- listFiles)}"
        echo "── HEAD s3://${bucket}/blobs/${blob} ──"
        aws s3api head-object --bucket "$bucket" --key "blobs/${blob}" \
          --query '{StorageClass:StorageClass,Size:ContentLength,Restore:Restore}' \
          --output table --profile coldstorage --region "$region"

  daemon:restore-wait:
    desc: "[macOS] Hands-off Deep Archive restore: re-fires `restore` against the INSTALLED daemon every INTERVAL until state=restored, then shows the recovered file. Start it and walk away (Glacier Standard thaw is ~12h). FILE=<id> OUT=<path> [TIER=standard] [INTERVAL=900]. Idempotent — re-issues no duplicate thaw while in progress."
    dir: coldstorage
    vars:
      SOCK: '{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock'
      OUT: '{{.OUT | default "/tmp/coldstore-restore-test.out"}}'
      TIER: '{{.TIER | default "standard"}}'
      INTERVAL: '{{.INTERVAL | default "900"}}'
    cmds:
      - test -S "{{.SOCK}}" || { echo "no installed daemon socket at {{.SOCK}} — run task daemon:bootstrap first"; exit 1; }
      - |
        file="{{.FILE}}"; : "${file:?pass FILE=<id> (from task daemon:live -- listFiles)}"
        ctl='./.build/release/coldstorectl'; sock="{{.SOCK}}"
        while :; do
          out="$($ctl "$sock" restore "file=$file" "out={{.OUT}}" "tier={{.TIER}}")"
          echo "[$(date '+%H:%M:%S')] $out"
          case "$out" in
            *'"state":"restored"'*) echo "✓ restored → {{.OUT}}"; break ;;
          esac
          sleep {{.INTERVAL}}
        done
        echo "── recovered file (first 40 lines) ──"
        head -n 40 "{{.OUT}}"

  daemon:install:
    desc: "[macOS] Build release + install the coldstored LaunchAgent (RunAtLoad/KeepAlive)."
    dir: coldstorage
    vars:
      DATA_DIR: '{{.HOME}}/Library/Application Support/ColdStorage'
      PLIST: '{{.HOME}}/Library/LaunchAgents/com.theadpharm.coldstored.plist'
    cmds:
      # Photos access prerequisite (explicit photo-deposit path): the Info.plist is embedded into coldstored
      # at link time via Package.swift (-sectcreate, macOS-only), and we codesign with a STABLE identity
      # below — TCC keys the Photos grant to (CFBundleIdentifier + signing identity), so a changing identity
      # resets the grant. Recipe proven in phase0-photos-spike. Folder/file deposit needs neither, but
      # signing is harmless for them, so we always sign — one code path, and photos "just work".
      - swift build -c release
      - |
        # Default to the first "Apple Development" identity in the Keychain; override with IDENTITY="…".
        # Keep it CONSTANT across releases or macOS re-prompts for Photos (the TCC grant is identity-keyed).
        identity="{{.IDENTITY}}"
        if [ -z "$identity" ]; then
          identity=$(security find-identity -v -p codesigning | sed -n 's/.*"\(Apple Development: [^"]*\)".*/\1/p' | head -1)
        fi
        if [ -z "$identity" ]; then
          echo "No Apple Development identity in your Keychain — pass one: task daemon:install IDENTITY=\"Apple Development: …\""; exit 1
        fi
        # --identifier pins the code-signing identifier to the bundle id (== launchd Label). TCC keys the
        # Photos grant to this identifier (NOT the embedded CFBundleIdentifier); without pinning, codesign
        # defaults it to the basename "coldstored", so `tccutil reset Photos com.theadpharm.coldstored`
        # wouldn't match. Pinning makes the grant + reset + launchd label all consistent.
        codesign --force --sign "$identity" --identifier com.theadpharm.coldstored .build/release/coldstored
        echo "signed coldstored as com.theadpharm.coldstored with: $identity  (keep this identity STABLE — TCC keys the Photos grant to it)"
      - mkdir -p "{{.DATA_DIR}}" "{{.HOME}}/Library/LaunchAgents"
      - |
        # Bucket/region come from the handoff file (written by `task tf:coldstorage:creds-export` in the
        # devcontainer — the SSOT is the infra outputs). Env vars still override (e.g. a MinIO test).
        CREDS="{{.ROOT_DIR}}/coldstorage/.local/daemon-creds.env"
        [ -f "$CREDS" ] && { set -a; . "$CREDS"; set +a; }
        bucket="${COLDSTORE_BUCKET:-coldstorage}"
        region="${AWS_REGION:-us-east-1}"
        profile="${COLDSTORE_AWS_PROFILE:-coldstorage}"   # creds resolve via this profile's credential_process (task daemon:creds)
        sed -e "s#__BINARY__#$(pwd)/.build/release/coldstored#g" \
            -e "s#__DATA_DIR__#{{.DATA_DIR}}#g" \
            -e "s#__SOCKET__#{{.DATA_DIR}}/coldstored.sock#g" \
            -e "s#__BUCKET__#${bucket}#g" \
            -e "s#__REGION__#${region}#g" \
            -e "s#__PROFILE__#${profile}#g" \
            launchd/com.theadpharm.coldstored.plist.template > "{{.PLIST}}"
        echo "wired: bucket=${bucket} region=${region} profile=${profile}"
      - launchctl bootout "gui/$(id -u)/com.theadpharm.coldstored" 2>/dev/null || true
      # Fresh logs each install: launchd APPENDS to StandardOut/ErrorPath (never truncates across
      # restarts), so a debugging run would otherwise be read against stale lines from prior runs. The old
      # daemon is booted out above, so its log fd is closed — safe to truncate before the new one starts.
      - ': > "{{.DATA_DIR}}/coldstored.out.log"; : > "{{.DATA_DIR}}/coldstored.err.log"'
      - launchctl bootstrap "gui/$(id -u)" "{{.PLIST}}"
      - 'echo "installed → {{.PLIST}}  (socket: {{.DATA_DIR}}/coldstored.sock; logs reset)"'

  daemon:creds:
    desc: "[macOS] Seed the daemon's IAM-user creds into the login Keychain + wire the `coldstorage` AWS profile. Needs the handoff file — run `task tf:coldstorage:creds-export` in the devcontainer first."
    dir: coldstorage
    vars:
      # SCRIPT_DIR is a SPACE-FREE path on purpose: AWS splits `credential_process` on
      # whitespace, so the helper can't live under "…/Application Support/…".
      SCRIPT_DIR: '{{.HOME}}/.coldstorage'
      CREDS: '{{.ROOT_DIR}}/coldstorage/.local/daemon-creds.env'
    cmds:
      - mkdir -p "{{.SCRIPT_DIR}}" && chmod 700 "{{.SCRIPT_DIR}}"
      - |
        if [ ! -f "{{.CREDS}}" ]; then echo "missing {{.CREDS}} — run 'task tf:coldstorage:creds-export' in the devcontainer first"; exit 1; fi
        set -a; . "{{.CREDS}}"; set +a
        # Re-runnable: if the handoff file's secret was already stripped, fall back to the Keychain copy.
        akid="${DAEMON_AKID:-$(security find-generic-password -s coldstorage-aws-access-key-id     -w 2>/dev/null || true)}"
        secret="${DAEMON_SECRET:-$(security find-generic-password -s coldstorage-aws-secret-access-key -w 2>/dev/null || true)}"
        if [ -z "$akid" ] || [ -z "$secret" ]; then echo "no creds in {{.CREDS}} or Keychain — run 'task tf:coldstorage:creds-export' in the devcontainer first"; exit 1; fi
        # 1. secret + key id → login Keychain (encrypted; -U overwrites, so this doubles as rotate). security is macOS-only.
        security add-generic-password -a "$USER" -s coldstorage-aws-access-key-id     -w "$akid"   -U
        security add-generic-password -a "$USER" -s coldstorage-aws-secret-access-key -w "$secret" -U
        # 2. install the credential_process helper to the space-free path
        install -m 0755 launchd/coldstore-aws-credential-process.sh "{{.SCRIPT_DIR}}/coldstore-aws-credential-process.sh"
        # 3. wire the `coldstorage` profile. Prefer the aws CLI (also fixes a stale path on re-run); guarded append if absent.
        SCRIPT="{{.SCRIPT_DIR}}/coldstore-aws-credential-process.sh"
        if command -v aws >/dev/null 2>&1; then
          aws configure set profile.coldstorage.credential_process "$SCRIPT"
          aws configure set profile.coldstorage.region "$AWS_REGION"
        else
          cfg="$HOME/.aws/config"; mkdir -p "$HOME/.aws"; touch "$cfg"
          grep -q '^\[profile coldstorage\]' "$cfg" || printf '\n[profile coldstorage]\ncredential_process = %s\nregion = %s\n' "$SCRIPT" "$AWS_REGION" >> "$cfg"
        fi
        # 4. secret is in the Keychain now — strip it from the on-disk handoff (leave bucket/region/akid for daemon:install)
        grep -v '^DAEMON_SECRET=' "{{.CREDS}}" > "{{.CREDS}}.tmp" && mv "{{.CREDS}}.tmp" "{{.CREDS}}" && chmod 600 "{{.CREDS}}"
        echo "✓ Keychain seeded; profile 'coldstorage' wired (region=$AWS_REGION, helper=$SCRIPT); secret stripped from disk."
        echo "  health check: task daemon:doctor"

  daemon:bootstrap:
    desc: "[macOS] One-shot daemon setup: seed creds (Keychain + profile) → build + install the LaunchAgent. Run once, after `task tf:coldstorage:creds-export` in the devcontainer. After this, launchd keeps the daemon running (RunAtLoad/KeepAlive) — you don't re-run it to start it."
    cmds:
      - task: daemon:creds
      - task: daemon:install

  daemon:doctor:
    desc: "[macOS] Health-check the installed daemon: launchd state, AWS auth via the coldstorage profile (Keychain), and getStatus over the control socket."
    dir: coldstorage
    vars:
      SOCK: '{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock'
      ERRLOG: '{{.HOME}}/Library/Application Support/ColdStorage/coldstored.err.log'
    cmds:
      - 'echo "── launchd ──"'
      - launchctl print "gui/$(id -u)/com.theadpharm.coldstored" 2>/dev/null | grep -iE "state =|pid =|last exit" || echo "not loaded — run task daemon:bootstrap"
      - 'echo "── AWS auth (coldstorage profile → credential_process → Keychain) ──"'
      - aws sts get-caller-identity --profile coldstorage || echo "auth FAILED — re-run task daemon:bootstrap (fixes the profile), then re-check"
      - 'echo "── daemon status (control socket) ──"'
      - test -S "{{.SOCK}}" && ./.build/release/coldstorectl "{{.SOCK}}" getStatus || echo "no control socket at {{.SOCK}} — last errors:" && tail -n 20 "{{.ERRLOG}}" 2>/dev/null || true

  daemon:uninstall:
    desc: "[macOS] Stop + remove the coldstored LaunchAgent."
    vars:
      PLIST: '{{.HOME}}/Library/LaunchAgents/com.theadpharm.coldstored.plist'
    cmds:
      - launchctl bootout "gui/$(id -u)/com.theadpharm.coldstored" 2>/dev/null || true
      - rm -f "{{.PLIST}}"
      - 'echo "removed {{.PLIST}}"'

  daemon:reset:
    desc: "[macOS] DESTRUCTIVE — wipe the installed daemon's local state for a clean slate: stop it, delete the journal (the tree SSOT) + status + staged blobs + logs, restart empty. Comes back with NO files and NO watched folders. KEEPS the encryption key (dev-kek.bin) and does NOT touch S3 — old blobs in the prod vault are left orphaned (harmless; purge with an admin profile if you care). Re-deposits re-upload from scratch (the journal no longer marks anything verified)."
    dir: coldstorage
    vars:
      DATA_DIR: '{{.HOME}}/Library/Application Support/ColdStorage'
      PLIST: '{{.HOME}}/Library/LaunchAgents/com.theadpharm.coldstored.plist'
    cmds:
      # 1. Stop the daemon FIRST — it holds the SQLite handle (+WAL); deleting the journal under a live
      #    daemon would corrupt, not clean. bootout closes the log fds too, so truncating below is safe.
      - launchctl bootout "gui/$(id -u)/com.theadpharm.coldstored" 2>/dev/null || true
      # 2. Delete the journal + its WAL sidecars (the tree/sources/excludes SSOT) and the status cache.
      - rm -f "{{.DATA_DIR}}/coldstore.sqlite" "{{.DATA_DIR}}/coldstore.sqlite-wal" "{{.DATA_DIR}}/coldstore.sqlite-shm" "{{.DATA_DIR}}/status.json"
      # 3. Clear any half-staged blobs (orphaned once the journal is gone), then recreate the empty dir.
      - rm -rf "{{.DATA_DIR}}/staging" && mkdir -p "{{.DATA_DIR}}/staging"
      # 4. Fresh logs (the daemon will append to these on restart).
      - ': > "{{.DATA_DIR}}/coldstored.out.log"; : > "{{.DATA_DIR}}/coldstored.err.log"'
      # 5. Restart — the daemon recreates an empty journal on boot (RunAtLoad). dev-kek.bin is untouched.
      - launchctl bootstrap "gui/$(id -u)" "{{.PLIST}}"
      - 'echo "✓ reset — empty tree, no watched folders, fresh logs. Verify: task daemon:live -- listFiles (expect [])"'

  # ------------------------------------------------------------------ ui (domain: ui/)
  # Electron/React control panel — a THIN client over the daemon's control socket. Layer 1 = Node IPC
  # bridge (`node:net`); layer 2 = electron-vite shell (main/preload/renderer) + event-stream→state.
  # Tooling is Bun; the Electron runtime is its own bundled Node. See ELECTRON-UI-DESIGN.md.
  ui:setup:
    desc: "Install UI deps (Bun) + ensure Electron's native binary."
    dir: ui
    cmds:
      - bun install
      - task: ui:_ensure-electron

  ui:_ensure-electron:
    # Bun skips postinstall scripts by default, so Electron's binary download (its postinstall) never
    # runs → `task ui:dev` dies with "Electron uninstall". This runs the downloader directly, and is
    # idempotent: the `status` check skips it once the binary is present. A dep of ui:dev so launching
    # self-heals. (We also list electron in package.json trustedDependencies for fresh installs.)
    internal: true
    dir: ui
    status:
      - test -f node_modules/electron/path.txt
      - test -d node_modules/electron/dist
    cmds:
      - '[ -d node_modules/electron ] || bun install'
      - node node_modules/electron/install.js

  ui:typecheck:
    desc: "Type-check the UI package (strict; node + web projects)."
    dir: ui
    cmds:
      - bun run typecheck

  ui:test:
    desc: "Run the headless renderer tests (state fold + file-tree model; no Electron/daemon needed)."
    dir: ui
    cmds:
      - bun run test

  ui:dev:
    desc: "[macOS] Run the Electron app with HMR (electron-vite dev). Start `task daemon:run` first."
    dir: ui
    deps: [ui:_ensure-electron]
    env:
      # Electron runs with cwd=ui/, so the DaemonClient's relative default would miss the daemon's
      # socket. Point at it explicitly (same path daemon:run creates). Mirrors ui:prove.
      COLDSTORE_SOCKET: '{{.ROOT_DIR}}/coldstorage/coldstored.sock'
      # Absolute path to the native Photos-picker helper (built by daemon:build:dev/install) — the "Add photos…"
      # entry spawns it. Absolute so it resolves regardless of Electron's cwd.
      COLDSTORE_PHOTO_PICKER: '{{.ROOT_DIR}}/coldstorage/.build/release/coldstore-photo-picker'
    cmds:
      - bun run dev

  ui:live:
    desc: "[macOS] Run the UI against the INSTALLED launchd daemon (real prod AWS), not the dev/MinIO one — dogfood the real thing. Needs task daemon:bootstrap done."
    dir: ui
    deps: [ui:_ensure-electron]
    env:
      # The launchd daemon's socket (daemon:install path), NOT the dev socket ui:dev/ui:demo use.
      COLDSTORE_SOCKET: '{{.HOME}}/Library/Application Support/ColdStorage/coldstored.sock'
      COLDSTORE_PHOTO_PICKER: '{{.ROOT_DIR}}/coldstorage/.build/release/coldstore-photo-picker'
    cmds:
      - bun run dev

  ui:build:
    desc: "Build all three Electron processes (main/preload/renderer) to ui/out."
    dir: ui
    cmds:
      - bun run build

  ui:package:
    desc: "[macOS] Package a distributable ColdStorage.app (+ dmg/zip) via electron-builder. Bundles the release Swift binaries. Unsigned unless a Developer ID + notary creds are set — see ui/PACKAGING.md."
    dir: ui
    deps: [ui:_ensure-electron]
    cmds:
      # The bundled binaries must exist before electron-builder copies them (electron-builder.yml extraResources).
      - swift build -c release --package-path "{{.ROOT_DIR}}/coldstorage"
      - bun run build                # electron-vite → out/{main,preload,renderer}
      - bunx electron-builder --mac  # node CLI (not --bun); reads electron-builder.yml → ui/dist/ColdStorage.app + dmg/zip

  ui:package:verify:
    desc: "[macOS] Sanity-check the packaged app: bundled Swift binaries present + their code-signing status (the bits that can't be checked off-Mac)."
    dir: ui
    cmds:
      - |
        app=$(find dist -maxdepth 3 -name 'ColdStorage.app' -type d 2>/dev/null | head -1)
        [ -n "$app" ] || { echo "no ColdStorage.app under dist/ — run 'task ui:package' first"; exit 1; }
        echo "app: $app"
        echo "── bundled binaries (expect coldstored + helpers) ──"
        ls -la "$app/Contents/Resources/bin" || { echo "MISSING bin/ — extraResources didn't copy"; exit 1; }
        echo "── app signature ──";        codesign -dv --verbosity=2 "$app" 2>&1 | grep -Ei 'Identifier|Authority|Runtime' || echo "(unsigned)"
        echo "── coldstored signature ──"; codesign -dv --verbosity=2 "$app/Contents/Resources/bin/coldstored" 2>&1 | grep -Ei 'Identifier|Authority|Runtime' || echo "(unsigned — nested binary not signed)"

  ui:package:sign-adhoc:
    desc: "[macOS] Ad-hoc sign the built ColdStorage.app so it (+ its bundled arm64 helpers) will LAUNCH locally on Apple Silicon — a smoke-test stopgap. Ad-hoc is per-build (no stable TCC grant); real Developer/Apple-Development signing lands with #2. NOT for distribution."
    dir: ui
    cmds:
      - |
        app=$(find dist -maxdepth 3 -name 'ColdStorage.app' -type d 2>/dev/null | head -1)
        [ -n "$app" ] || { echo "no ColdStorage.app under dist/ — run 'task ui:package' first"; exit 1; }
        # Sign the nested helpers FIRST (inside-out), then the app — codesign requires nested code be sealed
        # before the outer bundle. `-s -` = ad-hoc (no cert needed, just enough for AMFI to let arm64 run).
        for b in "$app/Contents/Resources/bin/coldstored" \
                 "$app/Contents/Resources/bin/coldstore-photo-picker" \
                 "$app/Contents/Resources/bin/coldstore-restore"; do
          codesign --force --sign - "$b" && echo "ad-hoc signed: $(basename "$b")"
        done
        codesign --force --sign - "$app"
        echo "ad-hoc signed $app — launching…"
        open "$app"

  ui:config:
    desc: "[macOS] Write the packaged app's AWS config (~/Library/Application Support/ColdStorage/config.json: bucket/region/profile) from the infra-outputs handoff, so a Finder-launched ColdStorage.app — which inherits no shell env — can actually upload. NO secret is written here; creds resolve via the profile's credential_process → Keychain (run `task daemon:creds` once). Mirrors the env daemon:install bakes into the launchd plist."
    dir: coldstorage
    vars:
      DATA_DIR: '{{.HOME}}/Library/Application Support/ColdStorage'
    cmds:
      - mkdir -p "{{.DATA_DIR}}"
      - |
        # Same SSOT + defaults as daemon:install: bucket/region/profile come from the handoff file written
        # by `task tf:coldstorage:creds-export` in the devcontainer. Env vars still override (e.g. MinIO test).
        CREDS="{{.ROOT_DIR}}/coldstorage/.local/daemon-creds.env"
        [ -f "$CREDS" ] && { set -a; . "$CREDS"; set +a; }
        bucket="${COLDSTORE_BUCKET:-coldstorage}"
        region="${AWS_REGION:-us-east-1}"
        profile="${COLDSTORE_AWS_PROFILE:-coldstorage}"
        printf '{\n  "bucket": "%s",\n  "region": "%s",\n  "awsProfile": "%s"\n}\n' "$bucket" "$region" "$profile" > "{{.DATA_DIR}}/config.json"
        echo "wrote {{.DATA_DIR}}/config.json  (bucket=$bucket region=$region profile=$profile)"
        echo "creds: ensure 'task daemon:creds' wired the '$profile' profile + Keychain (one-time). Verify: task ui:package:doctor"

  ui:bootstrap:
    desc: "[macOS] One-shot setup so the packaged ColdStorage.app can upload: seed creds (Keychain + `coldstorage` profile) → write the app's config.json. Run once after `task tf:coldstorage:creds-export` (devcontainer). The .app analogue of daemon:bootstrap."
    cmds:
      - task: daemon:creds
      - task: ui:config

  ui:package:doctor:
    desc: "[macOS] Diagnose a packaged app stuck on 'Connecting…': did the bundled coldstored spawn, bind its socket, and what did it log?"
    cmds:
      - |
        echo "── data dir (auto-discovered) ──"
        dir=$(ls -d "$HOME/Library/Application Support/"*[Cc]old[Ss]torage* 2>/dev/null | head -1)
        if [ -z "$dir" ]; then
          echo "NONE — the app never created a data dir ⇒ the daemon never started."
          echo "Most likely the bundle is stale. Rebuild: task ui:package && task ui:package:sign-adhoc"; exit 0
        fi
        echo "$dir"
        echo "── coldstored process ──"; pgrep -fl coldstored || echo "NOT running (never spawned, or crash-looping)"
        echo "── control socket ──"; ls -l "$dir/coldstored.sock" 2>/dev/null || echo "no socket (daemon never bound it)"
        # Upload prerequisites (the "connects but can't upload" blocker): config.json + the AWS profile it names.
        echo "── upload config (config.json) ──"
        if [ -f "$dir/config.json" ]; then
          cat "$dir/config.json"
          profile=$(sed -n 's/.*"awsProfile"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$dir/config.json")
          profile="${profile:-coldstorage}"
          echo "── AWS auth (profile '$profile' → credential_process → Keychain) ──"
          aws sts get-caller-identity --profile "$profile" 2>&1 | grep -Ei 'Arn|error|could not|Unable' \
            || echo "auth FAILED — run 'task daemon:creds' (wires the profile + Keychain)"
        else
          echo "MISSING — a Finder-launched app can't upload without it. Run 'task ui:config' (or 'task ui:bootstrap')."
        fi
        echo "── coldstored.err.log (last 25) ──"; tail -n 25 "$dir/coldstored.err.log" 2>/dev/null || echo "(no err log — coldstored likely never spawned)"

  ui:demo:
    desc: "[macOS] One command to dogfood locally: MinIO + daemon (background) + the UI. Ctrl-C stops the UI; `task dev:stop` stops the rest."
    deps: [daemon:minio]       # MinIO (bg) + bucket + OS-correct binaries
    cmds:
      - task: daemon:run:bg    # daemon in the background, waits for its socket
      - task: ui:dev           # the UI in the foreground

  dev:stop:
    desc: "Stop the background daemon + MinIO left running by `task ui:demo`."
    cmds:
      - 'pkill -f "coldstored$" 2>/dev/null || true'
      - task: daemon:minio:stop

  ui:prove:
    desc: "Prove the layer-1 IPC bridge against a running daemon. Start `task daemon:run` first."
    dir: ui
    env:
      COLDSTORE_SOCKET: '{{.ROOT_DIR}}/coldstorage/coldstored.sock'
    cmds:
      - bun run prove

  # ------------------------------------------------------------------ infra — tf:coldstorage:* (domain: infra/coldstorage)
  # Storage buckets (S3 Glacier Deep Archive + R2) + lifecycle rules. State in
  # terraform-state-sensitive (pharmer / ca-central-1); ENV-scoped; shared planned first.
  # NOTE: infra/coldstorage scaffolding is the next build chunk — surface wired per convention.
  tf:coldstorage:_validate-env:
    internal: true
    requires:
      vars: [ENV]
    cmds:
      - 'case "{{.ENV}}" in production|staging) ;; *) echo "ENV must be production|staging"; exit 1 ;; esac'

  tf:coldstorage:plan:
    desc: Terragrunt plan (ENV=production|staging) — plans shared first
    requires:
      vars: [ENV]
    deps: [check-aws-identity]
    dir: infra/coldstorage/live/{{.ENV}}
    cmds:
      - task: tf:coldstorage:_validate-env
      - task: tf:coldstorage:plan:shared
      - terragrunt plan {{.CLI_ARGS}}
  tf:coldstorage:plan:shared:
    deps: [check-aws-identity]
    dir: infra/coldstorage/live/shared
    cmds:
      - terragrunt plan {{.CLI_ARGS}}

  tf:coldstorage:apply:
    desc: Terragrunt apply (ENV=…) — applies shared then env. Never run without a reviewed plan.
    interactive: true
    prompt: "Apply ColdStorage infra to {{.ENV}}?"
    requires:
      vars: [ENV]
    deps: [check-aws-identity]
    dir: infra/coldstorage/live/{{.ENV}}
    cmds:
      - task: tf:coldstorage:_validate-env
      - task: tf:coldstorage:apply:shared
      - terragrunt apply {{.CLI_ARGS}}
  tf:coldstorage:apply:shared:
    internal: true
    interactive: true
    dir: infra/coldstorage/live/shared
    cmds:
      - terragrunt apply {{.CLI_ARGS}}

  tf:coldstorage:init:
    requires:
      vars: [ENV]
    deps: [check-aws-identity]
    dir: infra/coldstorage/live/{{.ENV}}
    cmds:
      - task: tf:coldstorage:_validate-env
      - terragrunt init {{.CLI_ARGS}}

  tf:coldstorage:creds-export:
    desc: "[devcontainer] Export the daemon's creds from TF state → gitignored handoff file the macOS daemon:* tasks read (so the Mac needs no terragrunt). Run after apply; the file rides the bind mount to the Mac."
    deps: [check-aws-identity]
    dir: infra/coldstorage/live/production
    vars:
      DIR: '{{.ROOT_DIR}}/coldstorage/.local'
      OUT: '{{.ROOT_DIR}}/coldstorage/.local/daemon-creds.env'
    cmds:
      - mkdir -p "{{.DIR}}" && chmod 700 "{{.DIR}}"
      - |
        # Lock perms before writing the secret: create empty, chmod 600, then `>` (preserves the mode).
        touch "{{.OUT}}" && chmod 600 "{{.OUT}}"
        {
          echo "COLDSTORE_BUCKET=$(terragrunt output -raw bucket_name)"
          echo "AWS_REGION=$(terragrunt output -raw aws_region)"
          echo "DAEMON_AKID=$(terragrunt output -raw daemon_access_key_id)"
          echo "DAEMON_SECRET=$(terragrunt output -raw daemon_secret_access_key)"
        } > "{{.OUT}}"
        echo "✓ wrote {{.OUT}} (0600, gitignored)."
        echo "  now on the Mac:  task daemon:creds && task daemon:install"

  tf:fmt:
    desc: terraform fmt across infra/
    cmds:
      - terraform fmt -recursive infra/

  # ------------------------------------------------------------------ Security — leak guard (core)
  # Local secret scan over git HISTORY — the public-exposure surface for this public repo.
  # Reads only committed content, so gitignored state/tfvars/.terragrunt-cache are excluded
  # automatically (no false positives off the real secret sitting in local state).
  # The at-PUSH net is GitHub push protection (server-side, free on public repos) — this is the
  # before-push local check. Prefers a host `gitleaks`; else runs the pinned container (no install).
  scan:
    desc: "Scan git history for leaked secrets (run before pushing infra/ or anything sensitive)"
    silent: true
    cmds:
      - >-
        if command -v gitleaks >/dev/null 2>&1; then
        gitleaks git . --no-banner --redact;
        else
        docker run --rm -v "{{.ROOT_DIR}}:/repo" {{.GITLEAKS_IMAGE}} git /repo --no-banner --redact;
        fi && echo "✓ gitleaks: no secrets found in git history"

  hooks:install:
    desc: "Point git at the tracked .githooks/ dir → enables the pre-commit leak guard. Idempotent."
    silent: true
    cmds:
      - git config core.hooksPath .githooks
      - echo "✓ core.hooksPath → .githooks (pre-commit gitleaks scan active; bypass with 'git commit --no-verify')"

  # ------------------------------------------------------------------ One-offs (temp) — quarantined + dated
  # A throwaway is STILL a task (so .env/AWS load the same). Convention:
  #   1. script → scripts/tmp/<slug>.ts   (scripts/tmp/ is gitignored — never committed)
  #   2. add a dated `tmp-<slug>` block below with a DELETE-AFTER-RUN banner
  #   3. once run: delete the block + script, then `task tmp-sweep` to confirm nothing lingers
  tmp-sweep:
    desc: List lingering one-offs (tmp-* tasks + scripts/tmp/ files) so they can be removed
    aliases: [tmp:sweep]
    silent: true
    cmds:
      - |
        echo "── tmp-* task blocks still in Taskfile.yml ──"
        grep -nE '^  tmp-[a-z0-9-]+:' Taskfile.yml | grep -v 'tmp-sweep:' || echo "  (none — clean)"
        echo "── files in scripts/tmp/ ──"
        ls -1 scripts/tmp/ 2>/dev/null | grep -v '^\.gitkeep$' || echo "  (none — clean)"

  # ---- one-off task blocks go below; DELETE each (block + script) once it has run ----
  # tmp-backfill-foo:        # added 2026-06-19 — DELETE AFTER RUN
  #   desc: '[ONE-OFF 2026-06-19] backfill foo, then remove this task + its script'
  #   aliases: [tmp:backfill-foo]
  #   deps: [check-aws-identity]      # only if it touches AWS
  #   cmds:
  #     - bun run scripts/tmp/backfill-foo.ts {{.CLI_ARGS}}
